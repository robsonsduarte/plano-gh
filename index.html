<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Plano GH">
<meta name="theme-color" content="#0d1f0d">
<title>Plano GH 30 Dias</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root {
  --g0:#0d1f0d;--g1:#1a2e1a;--g2:#2D6A4F;--g3:#52B788;--g4:#95D5B2;--g5:#D8F3DC;
  --amber:#D4A017;--coral:#C75643;--purple:#7B5EA7;
  --cream:#FAF7F2;--tm:#4a6741;--ts:#7a9170;
  --st: env(safe-area-inset-top);--sb: env(safe-area-inset-bottom);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--g0);color:var(--cream)}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:999;background:var(--g0);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s}
#splash.gone{opacity:0;pointer-events:none}
.splash-icon{width:90px;height:90px;border-radius:24px;background:linear-gradient(135deg,var(--g2),var(--g3));display:flex;align-items:center;justify-content:center;font-size:2.8rem;margin-bottom:20px;box-shadow:0 16px 48px rgba(82,183,136,.35)}
#splash h1{font-family:'DM Serif Display',serif;font-size:2.2rem;color:var(--g3);letter-spacing:-1px}
#splash p{color:var(--ts);font-size:.85rem;margin-top:8px}

/* LAYOUT */
#app{height:100%;display:flex;flex-direction:column}
.header{padding:calc(var(--st) + 14px) 18px 10px;background:rgba(13,31,13,.97);border-bottom:1px solid rgba(82,183,136,.15);backdrop-filter:blur(12px);flex-shrink:0}
.h-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.h-title{font-family:'DM Serif Display',serif;font-size:1.35rem;color:var(--g3)}
.h-badge{font-size:.65rem;font-weight:600;background:rgba(82,183,136,.12);border:1px solid rgba(82,183,136,.25);color:var(--g4);padding:4px 10px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}
.week-tabs{display:flex;gap:6px}
.wtab{flex:1;padding:8px 4px;text-align:center;font-size:.72rem;font-weight:500;border-radius:10px;border:1px solid rgba(82,183,136,.18);background:transparent;color:var(--ts);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.wtab.active{background:var(--g2);color:#fff;border-color:var(--g2);box-shadow:0 4px 14px rgba(45,106,79,.4)}

.day-strip{display:flex;gap:7px;padding:10px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:rgba(13,31,13,.95);border-bottom:1px solid rgba(82,183,136,.08);scrollbar-width:none;flex-shrink:0}
.day-strip::-webkit-scrollbar{display:none}
.dpill{flex-shrink:0;padding:6px 13px;font-size:.72rem;font-weight:500;border-radius:20px;border:1px solid rgba(82,183,136,.18);background:transparent;color:var(--ts);cursor:pointer;transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.dpill.active{background:rgba(82,183,136,.15);border-color:var(--g3);color:var(--g3)}

.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 15px calc(var(--sb) + 76px)}

/* DAY HERO */
.hero{background:linear-gradient(135deg,rgba(45,106,79,.28),rgba(82,183,136,.08));border:1px solid rgba(82,183,136,.18);border-radius:16px;padding:15px 17px;margin-bottom:14px}
.hero-name{font-family:'DM Serif Display',serif;font-size:1.25rem;color:var(--g3)}
.hero-sub{font-size:.75rem;color:var(--ts);margin-top:3px}
.macros{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.mc{background:rgba(0,0,0,.25);border-radius:10px;padding:8px 4px;text-align:center}
.mv{font-size:.95rem;font-weight:600;color:var(--g4)}
.ml{font-size:.6rem;color:var(--ts);margin-top:2px}

/* MEAL CARD */
.meal{background:rgba(26,46,26,.75);border:1px solid rgba(82,183,136,.1);border-radius:14px;margin-bottom:9px;overflow:hidden;cursor:pointer;transition:border-color .2s}
.meal.open{border-color:rgba(82,183,136,.3);background:rgba(45,106,79,.18)}
.meal-head{display:flex;align-items:center;gap:8px;padding:13px 14px 10px;position:relative}
.mbadge{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:3px 9px;border-radius:20px}
.bc{background:rgba(212,160,23,.18);color:var(--amber);border:1px solid rgba(212,160,23,.28)}
.ba{background:rgba(82,183,136,.18);color:var(--g3);border:1px solid rgba(82,183,136,.28)}
.bj{background:rgba(123,94,167,.18);color:#B39DDB;border:1px solid rgba(123,94,167,.28)}
.bl{background:rgba(199,86,67,.18);color:#EF9A9A;border:1px solid rgba(199,86,67,.28)}
.bce{background:rgba(74,103,65,.25);color:var(--g4);border:1px solid rgba(74,103,65,.38)}
.gh-tag{font-size:.58rem;font-weight:600;color:var(--g3);background:rgba(82,183,136,.12);border:1px solid rgba(82,183,136,.25);padding:2px 7px;border-radius:10px}
.mtime{font-size:.68rem;color:var(--ts);margin-left:auto}
.chev{font-size:.7rem;color:var(--ts);transition:transform .22s;margin-left:6px}
.meal.open .chev{transform:rotate(180deg)}
.mname{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--cream);padding:0 14px 4px}
.mpreview{font-size:.76rem;color:var(--ts);padding:0 14px 12px;line-height:1.5}
.meal.open .mpreview{display:none}
.mitems{font-size:.8rem;color:var(--tm);padding:4px 14px 14px;line-height:1.7;display:none;border-top:1px solid rgba(82,183,136,.1);margin-top:4px;padding-top:12px}
.meal.open .mitems{display:block}
.meal-bar{width:3px;position:absolute;left:0;top:0;bottom:0}

/* TIP */
.tip{background:rgba(45,106,79,.15);border-left:3px solid var(--g3);border-radius:0 12px 12px 0;padding:11px 13px;margin-top:4px;font-size:.8rem;color:var(--g5);line-height:1.65}
.tip-lbl{font-size:.6rem;font-weight:600;color:var(--g3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}

/* JEJUM BADGE */
.jejum-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(212,160,23,.12);border:1px solid rgba(212,160,23,.25);color:var(--amber);border-radius:10px;padding:6px 12px;font-size:.75rem;font-weight:500;margin-bottom:14px}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;padding:8px 16px calc(var(--sb) + 8px);background:rgba(10,24,10,.97);border-top:1px solid rgba(82,183,136,.12);backdrop-filter:blur(14px);display:flex;gap:6px}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border-radius:12px;border:1px solid transparent;background:transparent;color:var(--ts);cursor:pointer;font-size:.68rem;font-family:'DM Sans',sans-serif;transition:all .2s}
.nbtn.active{background:rgba(82,183,136,.1);color:var(--g3);border-color:rgba(82,183,136,.25)}
.nicon{font-size:1.15rem}

/* PAGES */
.page{display:none}
.page.active{display:block}

/* PERFIL PAGE */
.perfil-card{background:rgba(26,46,26,.8);border:1px solid rgba(82,183,136,.15);border-radius:16px;padding:16px;margin-bottom:12px}
.perfil-title{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--g3);margin-bottom:12px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(82,183,136,.08);font-size:.82rem}
.info-row:last-child{border-bottom:none}
.info-lbl{color:var(--ts)}
.info-val{color:var(--cream);font-weight:500}
.info-val.ok{color:var(--g3)}
.info-val.warn{color:var(--amber)}
.progress-bar-wrap{margin-top:6px}
.pbar-lbl{display:flex;justify-content:space-between;font-size:.72rem;color:var(--ts);margin-bottom:5px}
.pbar{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--g2),var(--g3));transition:width .8s ease}

.nutrientes-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.nut-card{background:rgba(26,46,26,.8);border:1px solid rgba(82,183,136,.12);border-radius:12px;padding:12px}
.nut-icon{font-size:1.3rem;margin-bottom:6px}
.nut-name{font-size:.72rem;color:var(--ts);margin-bottom:3px}
.nut-val{font-size:1rem;font-weight:600;color:var(--g4)}
.nut-desc{font-size:.65rem;color:var(--ts);margin-top:3px;line-height:1.4}

.install-box{background:linear-gradient(135deg,rgba(45,106,79,.3),rgba(82,183,136,.1));border:1px solid rgba(82,183,136,.25);border-radius:14px;padding:15px;margin-bottom:12px;font-size:.8rem;color:var(--g5);line-height:1.7}
.install-title{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--g3);margin-bottom:8px}

/* MERCADO */
.semana-sel{display:flex;gap:6px;margin-bottom:16px}
.ssel{flex:1;padding:8px 4px;text-align:center;font-size:.72rem;font-weight:500;border-radius:10px;border:1px solid rgba(82,183,136,.18);background:transparent;color:var(--ts);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.ssel.active{background:var(--g2);color:#fff;border-color:var(--g2)}
.mcat{margin-bottom:18px}
.mcat-title{display:flex;align-items:center;gap:8px;font-size:.78rem;font-weight:600;color:var(--g4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(82,183,136,.12)}
.mcat-icon{font-size:1.1rem}
.mitem{display:flex;align-items:center;gap:12px;padding:10px 14px;background:rgba(26,46,26,.7);border:1px solid rgba(82,183,136,.1);border-radius:12px;margin-bottom:7px;cursor:pointer;transition:all .2s}
.mitem.checked{background:rgba(45,106,79,.2);border-color:rgba(82,183,136,.3);opacity:.7}
.mcheck{width:22px;height:22px;border-radius:6px;border:1.5px solid rgba(82,183,136,.4);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:.8rem}
.mitem.checked .mcheck{background:var(--g3);border-color:var(--g3);color:#fff}
.mitem-info{flex:1}
.mitem-name{font-size:.85rem;color:var(--cream);font-weight:500}
.mitem.checked .mitem-name{text-decoration:line-through;color:var(--ts)}
.mitem-qty{font-size:.72rem;color:var(--ts);margin-top:2px}
.mitem-tag{font-size:.6rem;font-weight:600;padding:2px 7px;border-radius:10px;background:rgba(82,183,136,.15);color:var(--g3);border:1px solid rgba(82,183,136,.2)}
.mercado-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mercado-title{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--g3)}
.reset-btn{font-size:.72rem;color:var(--ts);background:transparent;border:1px solid rgba(82,183,136,.2);padding:5px 10px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif}
.progress-compra{background:rgba(26,46,26,.8);border:1px solid rgba(82,183,136,.15);border-radius:12px;padding:12px 14px;margin-bottom:16px}
.pc-row{display:flex;justify-content:space-between;font-size:.78rem;color:var(--ts);margin-bottom:7px}
.pc-val{color:var(--g3);font-weight:600}
.pbar2{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.pfill2{height:100%;background:linear-gradient(90deg,var(--g2),var(--g3));border-radius:3px;transition:width .4s ease}

/* REGRAS */
.regras-section{margin-bottom:16px}
.regra-card{background:rgba(26,46,26,.7);border:1px solid rgba(82,183,136,.1);border-radius:12px;padding:13px 14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
.regra-num{width:26px;height:26px;border-radius:50%;background:var(--g2);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:600;flex-shrink:0;margin-top:1px}
.regra-txt{font-size:.8rem;color:var(--tm);line-height:1.6}
.regra-txt strong{color:var(--cream);font-weight:500}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-icon">🌿</div>
  <h1>Plano GH</h1>
  <p>30 dias · Otimização hormonal</p>
</div>

<div id="app">
  <div class="header">
    <div class="h-top">
      <span class="h-title">Plano GH 30 Dias</span>
      <span class="h-badge">~1.950 kcal</span>
    </div>
    <div class="week-tabs" id="weekTabs"></div>
  </div>
  <div class="day-strip" id="dayStrip"></div>

  <div class="scroll" id="mainScroll">
    <div class="page active" id="page-cardapio"></div>
    <div class="page" id="page-perfil"></div>
    <div class="page" id="page-regras"></div>
    <div class="page" id="page-mercado"></div>
  </div>
</div>

<div class="bnav">
  <button class="nbtn active" onclick="showPage('cardapio',this)"><span class="nicon">🥗</span>Cardápio</button>
  <button class="nbtn" onclick="showPage('perfil',this)"><span class="nicon">👤</span>Perfil</button>
  <button class="nbtn" onclick="showPage('regras',this)"><span class="nicon">📋</span>Regras GH</button>
  <button class="nbtn" onclick="showPage('mercado',this)"><span class="nicon">🛒</span>Mercado</button>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const DAYS_PT = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
const WEEK_LABELS = ['Semana 1','Semana 2','Semana 3','Semana 4'];

// Macro padrão ajustado: ~1950 kcal, 160g prot, 190g carb, 65g gord
const MAC = {kcal:'~1.950',prot:'160g',carb:'190g',gord:'65g'};

const MACJ = {kcal:'~1.600',prot:'150g',carb:'150g',gord:'60g'};

function M(tipo,time,nome,itens,gh=true){return{tipo,time,nome,itens,gh}}

const DATA = {
// ── SEMANA 1 ─────────────────────────────────────────────────────────────────
'1-1':{day:'Segunda · Dia 1',jejum:false,mac:MAC,tip:'Dia 1: evite carbs simples à noite. O GH é liberado no pico do sono — a ceia leve com triptofano (banana) favorece esse processo.',meals:[
  M('cafe','07:00','Café da Manhã','3 ovos mexidos com cúrcuma · Aveia (40g) com mirtilos · Café preto sem açúcar'),
  M('lanche','10:00','Lanche Manhã','1 punhado de castanhas (25g) · 1 maçã verde'),
  M('almoco','12:30','Almoço','Frango grelhado (160g) · Arroz integral (3 col) · Salada: beterraba, folhas verdes, azeite · Limão'),
  M('lanche','16:00','Lanche Tarde','Iogurte grego natural (130g) · Sementes de abóbora (15g) · Morangos'),
  M('jantar','19:00','Jantar','Salmão (130g) com gengibre e alho · Brócolis no vapor · Azeite extra virgem'),
  M('ceia','21:00','Ceia','1 banana média · 1 col chá de amendoim integral',false),
]},
'1-2':{day:'Terça · Dia 2',jejum:false,mac:MAC,tip:'Cereja ácida é fonte natural de melatonina — potencializa a liberação noturna de GH. Evite telas 1h antes do sono.',meals:[
  M('cafe','07:00','Café da Manhã','2 ovos cozidos · Pão integral (1 fatia) com abacate amassado · Chá verde'),
  M('lanche','10:00','Lanche Manhã','Amendoim natural (25g) · 1 pera'),
  M('almoco','12:30','Almoço','Atum ao natural (1 lata) · Lentilha cozida (4 col) · Cenoura ralada · Azeite e limão'),

'1-3':{day:'Quarta · Dia 3',jejum:false,mac:MAC,tip:'Compacte as refeições em 10h se possível (ex: 7h–19h). O jejum de 12–14h noturno já potencializa o GH.',meals:[

  M('lanche','10:00','Lanche Manhã','Iogurte grego (130g) · Sementes de abóbora (15g)'),
  M('almoco','12:30','Almoço','Tilápia grelhada (160g) · Quinoa (3 col) · Salada de beterraba com hortelã · Azeite'),

  M('jantar','19:00','Jantar','Grão-de-bico (4 col) · Peito de frango (100g) grelhado · Brócolis com alho e azeite'),
  M('ceia','21:00','Ceia','1 banana · Chá de valeriana',false),
]},
'1-4':{day:'Quinta · Dia 4',jejum:false,mac:MAC,tip:'Cúrcuma reduz inflamação sistêmica, que suprime a somatostatina (hormônio que bloqueia o GH). Combine com pimenta-do-reino para melhor absorção.',meals:[
  M('cafe','07:00','Café da Manhã','3 ovos estrelados · Aveia (40g) com chia e mirtilos · Café preto'),
  M('lanche','10:00','Lanche Manhã','Mix de oleaginosas (25g) · 1 maçã'),
  M('almoco','12:30','Almoço','Contrafilé magro (130g) grelhado · Feijão preto (3 col) · Salada verde com tomate e azeite'),
  M('lanche','16:00','Lanche Tarde','Whey (1 dose) · Amendoim (15g)'),
  M('jantar','19:00','Jantar','Salmão (130g) com cúrcuma e limão · Espinafre refogado · Azeite'),
  M('ceia','21:00','Ceia','Cereja (80g) · Chá de camomila',false),
]},
'1-5':{day:'Sexta · Dia 5',jejum:false,mac:MAC,tip:'Treino de força hoje amplifica o GH. O pico pós-treino + sono profundo cria o maior estímulo natural possível.',meals:[

  M('lanche','10:00','Lanche Manhã','Castanhas (25g) · Morangos (80g)'),
  M('almoco','12:30','Almoço','Atum grelhado (160g) · Arroz integral (3 col) · Beterraba assada · Salada com azeite'),
  M('lanche','16:00','Lanche Tarde','Iogurte grego (130g) · Granola sem açúcar (15g) · Mirtilos'),
  M('jantar','19:00','Jantar','Frango ao forno com ervas (140g) · Lentilha ao curry leve · Couve refogada'),
  M('ceia','21:00','Ceia','1 banana · 1 col chá de pasta de amendoim natural',false),

  M('ceia','21:00','Ceia','Iogurte grego (80g) · 1 fio de mel puro',false),
]},
'1-7':{day:'Domingo · Dia 7',jejum:false,mac:MAC,tip:'Fim da Semana 1. Avalie: menos inchaço, mais disposição ao acordar, sono mais profundo — sinais de GH otimizado.',meals:[
  M('cafe','08:30','Café da Manhã','Panqueca de aveia e banana (1 un grande) · 2 ovos mexidos · Café preto com canela'),
  M('lanche','11:00','Lanche Manhã','Mix de castanhas (25g) · Açaí sem açúcar (80g)'),
  M('almoco','13:30','Almoço','Carne bovina magra (130g) · Lentilha com cenoura (4 col) · Arroz integral (2 col) · Salada verde'),
  M('lanche','16:00','Lanche Tarde','Iogurte grego (130g) · Sementes de abóbora · Morangos'),
  M('jantar','19:30','Jantar','Sopa de frango com legumes e gengibre · Pão integral (1 fatia)'),
  M('ceia','21:00','Ceia','Cereja (80g) · Chá de camomila sem açúcar',false),
]},
// ── SEMANA 2 ─────────────────────────────────────────────────────────────────

// ─── STATE ───────────────────────────────────────────────────────────────────
let cW=1, cD=1, openMeal=-1;

// ─── INIT ────────────────────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  setTimeout(()=>document.getElementById('splash').classList.add('gone'),1200);
  buildWeekTabs(); buildDayStrip(); renderCardapio();
  renderPerfil(); renderRegras();
});

function buildWeekTabs(){
  const el=document.getElementById('weekTabs');
  el.innerHTML=WEEK_LABELS.map((l,i)=>`<button class="wtab${i===0?' active':''}" onclick="setWeek(${i+1})">${l}</button>`).join('');
}

function buildDayStrip(){
  const el=document.getElementById('dayStrip');
  el.innerHTML=DAYS_PT.map((d,i)=>{
    const dayNum=(cW-1)*7+(i+1);
    const k=`${cW}-${i+1}`;
    const isJ=DATA[k]&&DATA[k].jejum;
    return `<button class="dpill${i===0?' active':''}" onclick="setDay(${i+1})">${d}${isJ?' ⚡':''}</button>`;
  }).join('');
}

function setWeek(w){
  cW=w; cD=1; openMeal=-1;
  document.querySelectorAll('.wtab').forEach((b,i)=>b.classList.toggle('active',i===w-1));
  buildDayStrip(); renderCardapio();
}

function setDay(d){
  cD=d; openMeal=-1;
  document.querySelectorAll('.dpill').forEach((b,i)=>b.classList.toggle('active',i===d-1));
  renderCardapio();
  document.getElementById('mainScroll').scrollTop=0;
}

function toggleMeal(i){
  openMeal=openMeal===i?-1:i;
  renderCardapio();
}

// ─── RENDER CARDAPIO ─────────────────────────────────────────────────────────
function renderCardapio(){
  const k=`${cW}-${cD}`;
  const d=DATA[k]; if(!d) return;
  const mac=d.mac;
  const BADGE={cafe:'bc',almoco:'ba',jantar:'bj',lanche:'bl',ceia:'bce'};
  const LABEL={cafe:'Café','almoco':'Almoço',jantar:'Jantar',lanche:'Lanche',ceia:'Ceia'};
  const BAR={cafe:'var(--amber)',almoco:'var(--g3)',jantar:'var(--purple)',lanche:'var(--coral)',ceia:'var(--g2)'};

  let html='';
  if(d.jejum) html+=`<div class="jejum-badge">⚡ Dia de Jejum 16/8 — janela alimentar das 12h às 20h</div>`;

  html+=`<div class="hero">
    <div class="hero-name">${d.day}</div>
    <div class="hero-sub">Plano ajustado · 1,70m · 90kg · 49 anos · IMC 31</div>
    <div class="macros">
      <div class="mc"><div class="mv">${mac.kcal}</div><div class="ml">kcal</div></div>
      <div class="mc"><div class="mv">${mac.prot}</div><div class="ml">proteína</div></div>
      <div class="mc"><div class="mv">${mac.carb}</div><div class="ml">carb</div></div>
      <div class="mc"><div class="mv">${mac.gord}</div><div class="ml">gordura</div></div>
    </div>
  </div>`;

  d.meals.forEach((m,i)=>{
    const isOpen=openMeal===i;
    const preview=m.itens.split('·')[0].trim()+'…';
    html+=`<div class="meal ${m.tipo}${isOpen?' open':''}" onclick="toggleMeal(${i})">

        <span class="chev">▾</span>
      </div>
      <div class="mname">${m.nome}</div>
      <div class="mpreview">${preview}</div>
      <div class="mitems">${m.itens.replace(/·/g,'<br>· ')}</div>
    </div>`;
  });

  html+=`<div class="tip"><div class="tip-lbl">💡 Dica do Dia</div>${d.tip}</div>`;
  document.getElementById('page-cardapio').innerHTML=html;
}

let mSemana = 1;
let checked = JSON.parse(localStorage.getItem('mChecked')||'{}');

function saveChecked(){ try{localStorage.setItem('mChecked',JSON.stringify(checked))}catch(e){} }

function toggleItem(key){
  checked[key]=!checked[key];
  saveChecked();
  renderMercado();
}

function resetMercado(){
  const prefix=`m${mSemana}-`;
  Object.keys(checked).forEach(k=>{ if(k.startsWith(prefix)) delete checked[k]; });
  saveChecked();
  renderMercado();
}

function setMSemana(s){
  mSemana=s;
  document.querySelectorAll('.ssel').forEach((b,i)=>b.classList.toggle('active',i===s-1));
  renderMercado();
}

function renderMercado(){
  const d=MERCADO[mSemana];
  let total=0, done=0;
  d.cats.forEach(c=>c.items.forEach(()=>total++));

  let html=`
    <div class="mercado-header">
      <span class="mercado-title">🛒 Lista do Mercado</span>
      <button class="reset-btn" onclick="resetMercado()">Limpar ✕</button>
    </div>
    <div class="semana-sel">
      ${[1,2,3,4].map(i=>`<button class="ssel${i===mSemana?' active':''}" onclick="setMSemana(${i})">Sem. ${i}</button>`).join('')}
    </div>`;

  d.cats.forEach((cat,ci)=>{
    html+=`<div class="mcat"><div class="mcat-title"><span class="mcat-icon">${cat.icon}</span>${cat.name}</div>`;
    cat.items.forEach((item,ii)=>{
      const key=`m${mSemana}-${ci}-${ii}`;
      const isChecked=!!checked[key];
      if(isChecked) done++;
      html+=`<div class="mitem${isChecked?' checked':''}" onclick="toggleItem('${key}')">
        <div class="mcheck">${isChecked?'✓':''}</div>
        <div class="mitem-info">
          <div class="mitem-name">${item.n}</div>
          <div class="mitem-qty">${item.q}</div>
        </div>
        ${item.gh?'<span class="mitem-tag">↑ GH</span>':''}
      </div>`;
    });
    html+=`</div>`;
  });

  // inject progress after semana-sel
  const pct=total?Math.round(done/total*100):0;
  const progressHtml=`<div class="progress-compra">
    <div class="pc-row"><span>Itens comprados</span><span class="pc-val">${done} de ${total}</span></div>
    <div class="pbar2"><div class="pfill2" style="width:${pct}%"></div></div>
  </div>`;

  document.getElementById('page-mercado').innerHTML=html;
  // insert progress after semana-sel div
  const sselDiv=document.getElementById('page-mercado').querySelector('.semana-sel');
  if(sselDiv) sselDiv.insertAdjacentHTML('afterend', progressHtml);
}

// ─── PAGE SWITCH ─────────────────────────────────────────────────────────────
function showPage(name, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  document.getElementById('mainScroll').scrollTop=0;
  const isCardapio=name==='cardapio';
  document.getElementById('weekTabs').style.display=isCardapio?'flex':'none';
  document.getElementById('dayStrip').style.display=isCardapio?'flex':'none';
  if(name==='perfil') renderPerfil();
  if(name==='mercado') renderMercado();
}
</script>
