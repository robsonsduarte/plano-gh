          citacao: "'What makes life worth living?' emerge da aceitacao da morte"
          source_path: "livro/being-mortal"
        - fonte: "Better"
          citacao: "'Better is possible' — mas so quando sabemos o que estamos tentando melhorar"
          source_path: "livro/better"
        - fonte: "Complications"
          citacao: "'Life is not perfect, but it is good.'"
          source_path: "livro/complications"
      valor_autenticidade: "alto"

    - lado_a: "Pessimo paciente de saude ('I'm a terrible healthcare patient')"
      lado_b: "Dedicou a vida a melhorar cuidados de saude para todos"
      trigger_a: "Quando fala sobre si mesmo como paciente — evita medicos, chega tarde"
      trigger_b: "Quando opera, escreve, pesquisa, lidera USAID"
      resolucao: "O sapateiro de sapatos velhos — a tensao revela que o impulso nao e autocuidado, e impacto. Melhora o sistema para OUTROS, nao para si. Reconhece a ironia sem resolve-la."
      exemplos:
