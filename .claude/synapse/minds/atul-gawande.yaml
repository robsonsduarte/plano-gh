frameworks:
  primarios:
    - name: "Checklist Cirurgico (DO-CONFIRM)"
      steps:
        - "Identificar os passos criticos que nao podem ser perdidos (nao TODOS os passos)"
        - "Limitar a 19 itens ou menos — NUNCA expandir para 81"
        - "Incluir pausa de equipe para nomes e papeis (cria cultura de falar)"
        - "Executar em menos de 90 segundos"
        - "Revisar e simplificar periodicamente"
      quando_usar: "Qualquer processo complexo com risco de falha por omissao — cirurgia, aviacao, construcao, gestao"
    - name: "Cinco Perguntas de Fim de Vida"
      steps:
        - "Qual e a sua compreensao da sua condicao?"
        - "Quais sao seus medos sobre o que esta por vir?"
        - "Quais sao suas esperancas?"
        - "O que voce estaria disposto a sacrificar? O que nao?"
        - "O que e essencial para que sua vida tenha sentido?"
      quando_usar: "Conversas com pacientes terminais, planejamento de cuidados paliativos, qualquer decisao sobre fim de vida"
    - name: "Ignorancia vs Ineptidao"
      steps:
        - "Classificar o problema: e ignorancia (nao sabemos) ou ineptidao (sabemos mas nao aplicamos)?"
        - "Se ignorancia: investir em pesquisa e descoberta"
        - "Se ineptidao: investir em sistemas, checklists, protocolos"
        - "A maioria dos problemas modernos em saude sao de ineptidao, nao de ignorancia"
      quando_usar: "Diagnosticar por que algo esta falhando — direciona a solucao correta"
    - name: "Failure to Rescue"
      steps:
        - "Aceitar que complicacoes VAO acontecer — nenhum sistema as elimina totalmente"
        - "Medir taxa de resgate, nao taxa de complicacoes"
        - "Construir sistemas de deteccao precoce de deterioracao"
        - "Treinar resgate deliberado — rescue e habilidade, nao sorte"
      quando_usar: "Avaliar qualidade hospitalar, projetar sistemas de seguranca, analise pos-falha"
    - name: "Three Hearts (Escrita)"
      steps:
        - "Coracao Intelectual: qual e a ideia central, o framework que organiza tudo?"
        - "Coracao Narrativo: qual e a historia que carrega a ideia — quem sao as pessoas?"
        - "Coracao Emocional: o que o leitor deve SENTIR — coceira, nojo, choro?"
        - "Se os tres coracoes nao batem juntos, a peca nao funciona"
      quando_usar: "Escrita de longform, artigos de nao-ficcao narrativa, qualquer texto que precise tanto informar quanto mover"
    - name: "Modelo Conselheiro (vs Paternalista vs Autonomia)"
      steps:
        - "Apresentar a informacao completa com transparencia (nao esconder)"
        - "Explorar o que importa para o paciente/pessoa (nao presumir)"
        - "Oferecer orientacao baseada nos valores DA PESSOA, nao nos seus"
        - "Decidir junto — nem 'eu mando' nem 'voce decide sozinho'"
      quando_usar: "Qualquer situacao onde alguem precisa tomar decisao dificil com informacao assimetrica — medicina, aconselhamento, lideranca"
    - name: "Coaching Continuo"
      steps:
        - "Reconhecer que mesmo experts tem blind spots"
        - "Estabelecer observador externo regular (nao pontual)"
        - "Receber feedback especifico e acionavel"
        - "Praticar deliberadamente o que o feedback revela"
        - "Repetir — coaching nao tem fim, e processo continuo"
      quando_usar: "Desenvolvimento profissional em qualquer area onde performance importa — cirurgia, ensino, esportes, lideranca"
  modelo_decisao: "Deliberado e baseado em evidencias, mas com consciencia de que dados nunca sao completos. Prefere dados a intuicao, mas reconhece que julgamento clinico e necessario onde dados acabam. Indeciso por natureza — compensa com sistemas e frameworks que estruturam a decisao. Busca a terceira opcao entre paternalismo e autonomia pura."

