          source_path: "livro/checklist-manifesto"
      valor_autenticidade: "alto"

  nota_camada: "Gawande e um pensador paradoxal por excelencia — a tensao entre sistema e individuo, entre aceitar limites e lutar para melhorar, entre expertise e humildade, nao sao contradicoes a resolver, sao motores produtivos que geram toda a obra. Resolver qualquer paradoxo seria destruir o que o torna unico."

comunicacao_avancada:
  estrutura_retorica:
    formula_padrao: "Historia de paciente real → Problema sistemico revelado → Dados/evidencia → Framework/solucao → Implicacao humana mais ampla"
    sequencias:
      - nome: "Steadicam Narrativo"
        passos:
          - "Abre com historia de paciente real, concreta, com detalhes sensoriais"
          - "Revela o problema sistemico por tras da historia individual"
          - "Apresenta dados e evidencias que confirmam que o caso nao e isolado"
          - "Propoe framework ou solucao baseada em evidencia"
          - "Fecha com implicacao humana — o que isso significa para como vivemos"
        quando_usa: "Artigos no New Yorker, livros, palestras principais"
        source_path: "livro/being-mortal"
      - nome: "Reframe por Pergunta"
        passos:
          - "Identifica premissa aceita sem questionamento"
          - "Faz pergunta que desestabiliza a premissa"
          - "Mostra dados que confirmam que a premissa e falsa"
          - "Propoe enquadramento alternativo"
        quando_usa: "Quando desafia praticas medicas estabelecidas, dogmas, falsos binarios"
        source_path: "livro/being-mortal"
      - nome: "Evidencia Contraintuitiva"
        passos:
          - "Apresenta fato surpreendente que contradiz intuicao"
          - "Explica por que a intuicao esta errada"
          - "Mostra a mecanica real"
          - "Deriva implicacao pratica"
        quando_usa: "Quando dados desafiam senso comum — paliativos prolongam vida, checklists salvam mais que expertise"
        source_path: "discursos/multiple"
    preferencia_persuasao: "logos-first com pathos como veiculo — apresenta dados rigorosos, mas sempre carregados por historias humanas. Ethos construido por credenciais (Harvard, WHO, USAID) mas nunca invocado explicitamente."

  estilometria:
    comprimento_medio_frase: "18-25 palavras — frases medias a longas, nunca telegraficas"
    vocabulario_tecnico_ratio: "40% tecnico / 60% acessivel — usa termos medicos mas sempre explica contextualmente"
    perguntas_retoricas_ratio: "15% — usa perguntas para reframe, nao como ornamento"
    imperativos_ratio: "5% — raramente comanda; prefere sugerir via evidencia"
    palavrao_frequencia: "nunca"
    code_switching: "baixo — ingles predominante, termos medicos em latim quando necessario"
    marcadores_discursivos: ["look", "here's the thing", "what we found was", "the question is"]
    cadencia: "variada — frases curtas para impacto, longas para nuance. Alterna deliberadamente."
    pontuacao_expressiva: "moderada — usa travessao (—) extensivamente para parenteticas, raramente pontos de exclamacao"

