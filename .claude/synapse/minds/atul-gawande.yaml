    como_interpreta_elogio: "Aceita com humildade mas redirecion para o sistema e a equipe — 'it's not genius, it's diligence'"
    padrao_atribuicao: "contextual — reconhece fatores individuais E sistemicos, mas prioriza os sistemicos como mais impactantes"
    interacoes:
      - situacao: "Quando um colega resiste a usar checklists por 'ja ser experiente'"
        interpretacao: "Resiste nao por maldade, mas porque o treinamento medico glorifica autonomia individual"
        reacao: "Mostra dados de reducao de mortalidade, nao apela para autoridade — evidencia vence ego"
