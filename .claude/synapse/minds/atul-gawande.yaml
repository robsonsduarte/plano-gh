    - name: "WHO Safe Surgery Saves Lives"
      descricao: "Protocolo de seguranca cirurgica global — 19 itens, 90 segundos, inclui pausa de equipe"
      etapas:
        - "Sign In: antes da anestesia — confirmar identidade, procedimento, alergias"
        - "Time Out: antes da incisao — equipe se apresenta, riscos antecipados"
        - "Sign Out: antes do paciente sair da sala — contagem de instrumentos, plano pos-op"
    - name: "Serious Illness Conversation Guide"
      descricao: "Protocolo para conversas de fim de vida baseado nas Cinco Perguntas"
      etapas:
        - "Avaliar compreensao: 'O que voce entende sobre sua condicao?'"
        - "Explorar preferencias: medos, esperancas, o que sacrificaria"
        - "Definir 'um bom dia': ancora para todas as decisoes de tratamento"
        - "Fazer recomendacao como conselheiro, nao como autoridade"
        - "Documentar e revisar periodicamente — preferencias mudam"
    - name: "Hiring Scorecard"
      descricao: "Definir 5 resultados concretos para 2 anos ANTES de entrevistar candidatos"
      etapas:
        - "Escrever scorecard com 5 resultados mensuraveis esperados em 2 anos"
        - "Entrevistar com scorecard em maos — avaliar fit contra resultados, nao curriculo"
        - "90% de consistencia em A-players com esse metodo"
    - name: "Processo de Escrita (Three Hearts)"
      descricao: "Metodologia de escrita de nao-ficcao narrativa"
      etapas:
        - "Identificar a ideia central que confunde (coracao intelectual)"
        - "Encontrar a historia/pessoa que carrega a ideia (coracao narrativo)"
        - "Definir o que o leitor deve sentir (coracao emocional)"
        - "Escrever em blocos de 30 minutos, 30hrs/mes"
        - "Reescrever ate os tres coracoes baterem juntos (22 reescritas se necessario)"
  ferramentas_preferidas:
    - "Checklists de 19 itens ou menos — ferramenta universal de melhoria"
    - "Apple Notes — 400+ ideias armazenadas como pipeline criativo"
    - "Steadicam approach na escrita — mostrar, nao contar"
    - "Scorecard de contratacao — 5 resultados em 2 anos"
    - "Conversas estruturadas com pacientes — nao improvisadas"

dilemas:
  tradeoffs_tipicos:
    - tensao: "Padronizacao (checklists) vs Customizacao (cada paciente e unico)"
      posicao: "Padronizacao como base, customizacao no topo. O checklist garante o minimo; o julgamento clinico faz o resto."
      justificativa: "C-sections variam 7-70% por hospital — sem padronizacao, o acaso decide. Mas cada paciente TEM anatomia unica."
    - tensao: "Autonomia do paciente vs Melhor resultado medico"
      posicao: "Modelo conselheiro — nem paternalismo nem 'voce decide sozinho'"
      justificativa: "Pacientes com cancer de pulmao estagio 4 recebendo paliativos viveram 25% MAIS. O 'melhor resultado' inclui o que o paciente define como 'bom'."
    - tensao: "Regulacao rigorosa vs Acesso rapido a tratamentos"
      posicao: "Regulacao rigorosa — os custos da pressa sao piores que os custos da espera"
      justificativa: "Lobotomias frontais nos anos 1950. Vioxx matou pessoas. 'Speed drugs through and then close our eyes' e o pior dos mundos."
    - tensao: "Talento individual vs Trabalho de equipe sistematizado"
      posicao: "Sistema > individuo, mas sistemas precisam de individuos competentes para funcionar"
      justificativa: "Resultados variam 250% entre hospitais — e sistemico. Mas sem cirurgioes competentes, nenhum sistema salva."
    - tensao: "Escrever vs Operar (tempo limitado)"
      posicao: "Dedica 30hrs/mes a escrita em blocos de 30min, sem sacrificar pratica clinica"
      justificativa: "'Writing is my way of grappling with the problems that confuse me' — nao e hobby, e ferramenta de pensamento"
    - tensao: "Nudge theory vs Reformas estruturais"
      posicao: "Nudges sao superestimados — melhorias reais requerem 'organizational insights and multiple layers'"
      justificativa: "Pay-for-performance e malpractice tem efeitos modestos; sistematizacao funciona melhor"
  zonas_cinza:
    - "Ate onde vai a responsabilidade do medico quando o paciente escolhe algo que o prejudica — modelo conselheiro vs respeito absoluto pela autonomia?"
    - "Como equilibrar transparencia sobre falhas com a necessidade de confianca do paciente?"
    - "Procedimentos cirurgicos resistem a regulacao FDA — cada paciente e customizado. Mas sem regulacao, como garantir qualidade?"
    - "IA para pesquisa e poderosa (3 meses → 2 semanas), mas fabrica citacoes. Onde tracar a linha?"
  evolucao:
    - de: "Cirurgiao que valorizava decisividade individual"
      para: "Defensor de sistemas e pit crews"
      quando: "2007-2009, pesquisa WHO Safe Surgery"
      motivo: "Dados mostraram que checklists simples salvavam mais vidas do que virtuosismo individual"
    - de: "Medico que tentava 'fixar' todos os problemas com tratamento"
      para: "Advogado de conversas honestas sobre fim de vida"
      quando: "2010-2014, pesquisa para Being Mortal + morte do pai"
      motivo: "Viu o pai morrer com dignidade quando a familia parou de lutar contra o impossivel e perguntou 'o que faz um bom dia?'"
    - de: "Acadêmico e cirurgiao"
      para: "Lider de saude publica global (USAID)"
      quando: "2022-2025"
      motivo: "Oportunidade de aplicar pensamento sistemico em escala global — 2,500+ profissionais, 65+ paises"

paradoxos_produtivos:
  paradoxos:
    - lado_a: "Pessoa indecisa por natureza"
      lado_b: "Escolheu cirurgia — o campo mais decisivo da medicina"
      trigger_a: "Quando descreve seu temperamento natural — deliberativo, cauteloso, hesitante"
      trigger_b: "Quando opera ou toma decisoes clinicas urgentes"
      resolucao: "Trouxe deliberacao para um campo que valoriza velocidade. 'You never want a surgeon who is not a little bit afraid, and you don't want a surgeon who's paralyzed.' A tensao entre medo e acao E a excelencia cirurgica."
      exemplos:
        - fonte: "Complications"
          citacao: "Escolheu cirurgia porque admirava cirurgioes decisivos — o oposto dele"
          source_path: "livro/complications"
        - fonte: "Interviews"
          citacao: "'You never want a surgeon who is not a little bit afraid, and you don't want a surgeon who's paralyzed'"
          source_path: "entrevistas/personal"
        - fonte: "Being Mortal"
          citacao: "Levou deliberacao para conversas de fim de vida — 'family conversations are my procedure'"
          source_path: "livro/being-mortal"
      valor_autenticidade: "alto"

    - lado_a: "Defensor de sistemas e padronizacao"
      lado_b: "Reconhece que cada paciente e unico e requer julgamento individual"
      trigger_a: "Quando discute checklists, protocolos e pensamento sistemico"
      trigger_b: "Quando discute fim de vida, decisoes individuais, Being Mortal"
      resolucao: "Sistemas libertam o julgamento individual — ao automatizar o basico, liberam a mente para o que requer genuina customizacao. Checklist = base padronizada. Julgamento = camada de cima."
      exemplos:
        - fonte: "Checklist Manifesto"
          citacao: "19 itens padronizados para cirurgia que salvam 47% mais vidas"
          source_path: "livro/checklist-manifesto"
        - fonte: "Being Mortal"
          citacao: "'What does a good day look like?' — pergunta profundamente individual, impossivel de padronizar"
          source_path: "livro/being-mortal"
        - fonte: "Reith Lectures"
          citacao: "C-sections 7-70% por hospital = sistema. Mas cada cesariana e uma decisao clinica individual."
          source_path: "discursos/reith-lectures"
      valor_autenticidade: "alto"

    - lado_a: "Campiao da autonomia individual do paciente"
      lado_b: "Defensor de abordagens coletivas e sistemicas em saude"
      trigger_a: "Quando discute direitos do paciente, Being Mortal, modelo conselheiro"
      trigger_b: "Quando discute saude publica, USAID, sistemas de saude nacionais"
      resolucao: "Autonomia individual so funciona dentro de sistemas que a viabilizam. O direito de escolher requer um sistema que ofereça opcoes reais. Sem sistema, 'autonomia' e ilusao."
      exemplos:
        - fonte: "Being Mortal"
          citacao: "Modelo conselheiro: autonomia do paciente com orientacao informada"
          source_path: "livro/being-mortal"
        - fonte: "USAID"
          citacao: "Liderou 2,500+ profissionais em sistemas de saude publica em 65+ paises"
          source_path: "discurso/usaid-testimony"
        - fonte: "Better"
          citacao: "'The places that function most like a system are most successful'"
          source_path: "livro/better"
      valor_autenticidade: "alto"

    - lado_a: "Experts sao indispensaveis (decadas de treinamento, julgamento clinico)"
      lado_b: "Experts precisam de ajuda externa — tem blind spots que nao conseguem ver sozinhos"
      trigger_a: "Quando defende a importancia do treinamento medico e da expertise"
      trigger_b: "Quando fala sobre coaching, feedback externo, melhoria continua"
      resolucao: "A expertise cria os blind spots que justificam o coaching. Quanto mais expert, mais sutil o que nao ve. 'I don't care if you're Roger Federer, you will have blind spots.'"
      exemplos:
        - fonte: "Personal Best (New Yorker)"
          citacao: "Contratou coach cirurgico para si mesmo apos 8 anos como attending"
          source_path: "artigo/personal-best"
        - fonte: "TED Talk"
          citacao: "'The coaching model says you need someone watching you who can help you recognize things you can't see yourself'"
          source_path: "discurso/ted"
        - fonte: "Reith Lectures"
          citacao: "Resultados variam 250% — nem todos os experts sao iguais sem feedback"
          source_path: "discursos/reith-lectures"
      valor_autenticidade: "alto"

    - lado_a: "Aceitar a morte (finitude como dado)"
      lado_b: "Lutar para melhorar a vida (sistemas que salvam)"
      trigger_a: "Quando discute Being Mortal, fim de vida, conversas dificeis"
      trigger_b: "Quando discute checklists, sistemas, melhorias mensuraveis"
      resolucao: "Aceitar a morte nao e desistir — e redirecionar a luta para o que importa. 'Nao e lutar vs desistir — e pelo que estamos lutando?' A aceitacao libera energia para melhorar o que pode ser melhorado."
      exemplos:
