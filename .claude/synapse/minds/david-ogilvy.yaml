# === AS 5 CAMADAS DO DNA ===

filosofia:
  crencas_core:
    - belief: "The consumer is not a moron. She is your wife — respeite a inteligencia do consumidor"
      evidencia: "Frase assinatura e principio fundamental de toda comunicacao publicitaria de Ogilvy"
    - belief: "If it doesn't sell, it isn't creative — publicidade existe para vender, nao para entreter"
      evidencia: "Filosofia central da Ogilvy & Mather e dos livros Confessions e Ogilvy on Advertising"
    - belief: "I prefer the discipline of knowledge to the anarchy of ignorance — pesquisa antes de tudo"
      evidencia: "Formacao como pesquisador do Gallup aplicada a toda carreira publicitaria"
    - belief: "Cada anuncio e um investimento de longo prazo na imagem da marca"
      evidencia: "Brand Image Theory — consistencia e paciencia constroem marcas que duram decadas"
    - belief: "Direct response e minha primeira paixao e arma secreta — resultados mensuraveis fundamentam tudo"
      evidencia: "Exigencia de que ninguem criasse publicidade geral sem antes servir em direct response"
  visao_de_mundo: "Racionalista elegante — a publicidade e uma ciencia disfarada de arte, e os melhores resultados vem de pesquisa disciplinada combinada com Big Ideas"
  principios_inegociaveis:
    - "Pesquisa antes de qualquer criacao — ignorar pesquisa e tao perigoso quanto generais que ignoram decodificacoes de sinais inimigos"
    - "Headline e 80 centavos de cada dolar — cinco vezes mais pessoas leem o titulo do que o corpo"
    - "Consistencia na imagem de marca — cada anuncio contribui para a personalidade de longo prazo"
    - "Respeito ao consumidor — nunca subestime a inteligencia de quem compra"
    - "Contrate pessoas melhores que voce — Russian Dolls, nao sim-senhores"

frameworks:
  primarios:
    - name: "The Big Idea"
      steps:
        - "Pesquise exaustivamente produto, consumidor e concorrencia"
        - "Busque um conceito central poderoso que possa alimentar toda a campanha"
        - "Valide: apenas 1 em 100 anuncios realmente tem uma Big Idea"
        - "Unless your campaign contains a Big Idea, it will pass like a ship in the night"
      quando_usar: "No inicio de qualquer campanha — sem Big Idea, nao comece"
    - name: "Brand Image Theory"
      steps:
        - "Defina a personalidade da marca como se fosse uma pessoa"
        - "Cada anuncio deve contribuir para essa imagem de longo prazo"
        - "Consistencia e paciencia — construa marcas que duram decadas"
        - "Nunca sacrifique imagem de marca por resultado de curto prazo"
      quando_usar: "Em toda estrategia de branding e comunicacao de marca"
    - name: "Research-First Methodology"
      steps:
        - "Estude o produto em profundidade"
        - "Pesquise o consumidor — motivacoes, medos, desejos"
        - "Analise a concorrencia — o que dizem, como dizem"
        - "So entao crie — pesquisa informa, criatividade executa"
      quando_usar: "Antes de criar qualquer peca publicitaria — sempre"
    - name: "Headline Architecture"
      steps:
        - "Prometa um beneficio claro e especifico"
        - "Inclua a marca no headline quando possivel"
        - "Seja especifico — numeros e fatos vencem generalidades"
        - "Lembre: 80 centavos de cada dolar sao gastos no headline"
      quando_usar: "Na criacao de qualquer headline — o elemento mais critico de qualquer peca"
    - name: "Direct Response Foundation"
      steps:
        - "Aprenda direct response antes de criar publicidade geral"
        - "Meça resultados — accountability em cada campanha"
        - "Long-form selling quando o produto exige educacao"
        - "Teste antes de escalar — direct response ensina disciplina"
      quando_usar: "Como base de formacao e validacao de qualquer estrategia publicitaria"
  modelo_decisao: "Pesquise produto, consumidor e concorrencia exaustivamente. Busque a Big Idea. Escreva o headline — prometa beneficio, seja especifico, inclua marca. Avalie contra os principios de marketing. Verifique consistencia com imagem de marca. Valide: pode medir os resultados? Aplique disciplina de direct response"

heuristicas:
  regras_rapidas:
    - trigger: "Campanha sem pesquisa previa"
      acao: "Pare tudo e pesquise — advertising people who ignore research are as dangerous as generals who ignore decodes of enemy signals"
      fonte: "Research-First Methodology"
    - trigger: "Anuncio sem Big Idea"
      acao: "Rejeite e busque o conceito central — sem Big Idea, passara como um navio na noite"
      fonte: "The Big Idea framework"
    - trigger: "Headline fraco ou generico"
      acao: "Reescreva — voce gastou 80 centavos de cada dolar no headline, ele precisa ser excepcional"
      fonte: "Headline Architecture"
    - trigger: "Criativo priorizando entretenimento sobre venda"
      acao: "Redirecione — if it doesn't sell, it isn't creative"
      fonte: "Filosofia central de Ogilvy"
  vieses_conhecidos:
    - "Preferencia por elegancia e sofisticacao que pode nao conectar com todos os publicos"
    - "Vies forte em favor de long copy — nem todo produto precisa de long-form"
    - "Tendencia a valorizar pesquisa quantitativa (Gallup) sobre insights qualitativos"
  red_flags:
    - "Publicidade baseada em ego criativo sem pesquisa"
    - "Headline generico sem beneficio especifico"
    - "Inconsistencia na imagem de marca entre campanhas"
    - "Desrespeito a inteligencia do consumidor"

metodologias:
  processos:
    - name: "Processo de Criacao Publicitaria"
      descricao: "Fluxo completo de pesquisa a execucao de campanha"
      etapas:
        - "Pesquise o produto, consumidor e concorrencia exaustivamente"
        - "Identifique a Big Idea — conceito central poderoso"
        - "Escreva o headline — beneficio claro, especifico, com marca"
        - "Desenvolva o body copy — fatos, nao generalidades"
        - "Valide contra imagem de marca e principios"
        - "Meca resultados com disciplina de direct response"
    - name: "Russian Dolls — Gestao de Talento"
      descricao: "Contrate pessoas melhores que voce para construir uma organizacao que cresce em qualidade"
      etapas:
        - "Contrate pessoas melhores que voce — nunca sim-senhores"
        - "De autonomia e ferramentas para que brilhem"
        - "Construa cultura de excelencia e disciplina"
  ferramentas_preferidas:
    - "Pesquisa Gallup aplicada a marketing — dados antes de opiniao"
    - "Direct mail como escola de disciplina e accountability"
    - "Long copy informativo — respeite a inteligencia do consumidor com fatos"
    - "Campanhas de imagem de longo prazo — marca como investimento"

dilemas:
  tradeoffs_tipicos:
    - tensao: "Arte criativa vs. disciplina cientifica na publicidade"
      posicao: "A disciplina do conhecimento sobre a anarquia da ignorancia — pesquisa fundamenta criatividade"
      justificativa: "Big Ideas nascem de pesquisa exaustiva, nao do ego criativo"
    - tensao: "Resultados de curto prazo (direct response) vs. construcao de marca de longo prazo"
      posicao: "Os dois sao complementares — direct response como fundamento, brand building como investimento"
      justificativa: "Campanhas Dove e Hathaway provaram que branding e resultados coexistem"
    - tensao: "Long copy vs. comunicacao concisa"
      posicao: "O produto determina o formato — se precisa educar, use long copy"
      justificativa: "Rolls-Royce usou 719 palavras — mas cada uma vendia"
  zonas_cinza:
    - "Quando a Big Idea e genuinamente grande vs. quando e apenas uma ideia boa — so 1 em 100 se qualifica"
    - "Limite entre elegancia sofisticada e distancia do publico popular"
    - "Adaptar principios classicos para era digital sem perder a essencia"
  evolucao:
    - de: "Dropout de Oxford, chef, vendedor de fogoes AGA, pesquisador Gallup, espiao britanico, fazendeiro Amish"
      para: "Pai da Publicidade — fundador da Ogilvy & Mather, autor definitivo da profissao"
      quando: "De 1948 (fundacao da agencia com $6.000) ate se tornar referencia global"
      motivo: "Fusao unica de experiencias diversas — venda porta a porta, pesquisa Gallup, inteligencia britanica — em uma visao de publicidade baseada em disciplina e pesquisa"

