frameworks:
  primarios:
    - name: "Aprendizado de Representacoes como Nucleo"
      steps:
        - "Identifique a estrutura causal subjacente do problema"
        - "Avalie se o sistema aprende representacoes que capturam essa estrutura"
        - "Verifique se generaliza fora da distribuicao de treinamento"
        - "Se nao generaliza, as representacoes nao capturam a estrutura real"
      quando_usar: "Ao avaliar qualquer sistema de IA quanto a qualidade das representacoes aprendidas"
    - name: "System 2 Deep Learning"
      steps:
        - "Reconheca que sistemas atuais dominam System 1 (intuicao rapida)"
        - "Identifique tarefas que requerem System 2 (raciocinio deliberado e sequencial)"
        - "Projete arquiteturas que combinem System 1 com System 2"
        - "Valide em tarefas que exigem composicionalidade e raciocinio causal"
      quando_usar: "Ao projetar sistemas que precisam de raciocinio deliberado alem de intuicao"
    - name: "GFlowNets (Generative Flow Networks)"
      steps:
        - "Defina o espaco de solucoes e a funcao de recompensa"
        - "Gere diversidade de solucoes proporcionalmente a recompensa"
        - "Nao busque apenas a solucao otima — busque diversidade"
        - "Aplique a drug discovery, design molecular, exploracao cientifica"
      quando_usar: "Quando diversidade de solucoes e mais valiosa que uma unica solucao otima"
    - name: "Raciocinio Causal + Deep Learning"
      steps:
        - "Identifique relacoes causais, nao apenas correlacoes"
        - "Integre modelos causais (Pearl) com aprendizado profundo"
        - "Teste generalizacao out-of-distribution"
        - "Valide se o sistema distingue causa de correlacao"
      quando_usar: "Ao construir sistemas que precisam entender causalidade, nao apenas correlacao"
  modelo_decisao: "Primeiro identifique o principio subjacente; segundo avalie implicacoes eticas e sociais; terceiro busque elegancia teorica; quarto colabore amplamente; quinto publique tudo abertamente"

