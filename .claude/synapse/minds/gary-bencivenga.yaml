# === AS 5 CAMADAS DO DNA ===

filosofia:
  crencas_core:
    - belief: "A gifted product is mightier than a gifted pen — o produto eh o cavalo, o copywriter eh apenas o joquei"
      evidencia: "Principio fundacional repetido em Bencivenga Bullets e Bencivenga 100"
    - belief: "Persistencia supera talento — 12 anos de pratica deliberada transformam mediocre em imbativel"
      evidencia: "Historia pessoal: quase demitido no inicio, tornou-se GOAT apos 12 anos de pratica deliberada"
    - belief: "Os principios sao impessoais — funcionam como leis da gravidade, independentes de quem os aplica"
      evidencia: "Autodepreciacao consistente sobre habilidade pessoal, confianca apenas nos principios"
    - belief: "Cada claim deve ser respaldado por prova inquestionavel — adormeca o alarme 'Yeah, sure...'"
      evidencia: "Framework Proof-Based Copywriting e uso sistematico da palavra 'because'"
    - belief: "O controle eh seu inimigo — nunca descanse sobre um anuncio vencedor, bata ele"
      evidencia: "Principio The Control Is Your Enemy — 85% win rate em testes head-to-head ao longo de decadas"
  visao_de_mundo: "Empirista-humilde — os principios funcionam independentes do talento pessoal, e so o split-run test determina a verdade"
  principios_inegociaveis:
    - "Produto primeiro, copy depois — a vantagem genuina do produto eh fundacao"
    - "Prova em cada claim — nunca afirmar sem evidencia"
    - "Humildade sobre habilidade pessoal — os principios importam mais que a pessoa"
    - "Copy nunca eh mais importante que o produto — viola o principio fundacional"

frameworks:
  primarios:
    - name: "Persuasion Equation (Equacao da Persuasao)"
      steps:
        - "Problema Urgente — fale da dor que a audiencia enfrenta"
        - "Solucao Unica — ofereça solucao diferenciada"
        - "Prova Inquestionavel — respalde com evidencia que elimina ceticismo"
        - "Acao Facil — torne o proximo passo sem esforco"
      quando_usar: "Em qualquer peca de copy — a formula universal de persuasao"
    - name: "Proof-Based Copywriting"
      steps:
        - "Construa cada claim em cima de prova"
        - "Use reason-why copy e a palavra 'because'"
        - "Adicione credibilidade de terceiros"
        - "Inclua prova na oferta (garantias, trials)"
        - "Adormeca o alarme 'Yeah, sure...'"
      quando_usar: "Para construir credibilidade e eliminar ceticismo do prospect"
    - name: "The Control Is Your Enemy"
      steps:
        - "Identifique o anuncio vencedor atual (o controle)"
        - "Analise suas forcas e fraquezas"
        - "Crie variacao que bata o controle"
        - "Teste head-to-head em split-run"
        - "Nunca descanse — o novo vencedor se torna o proximo inimigo"
      quando_usar: "Apos ter um anuncio vencedor — otimizacao continua"
    - name: "Heavy User Rule"
      steps:
        - "Identifique os 5% motivados que ja querem solucoes"
        - "Escreva para eles, nao para os 95% passivos"
        - "Foque nos compradores mais provaveis, nao no mercado geral"
      quando_usar: "Para direcionar a copy ao publico com maior propensao de compra"
  modelo_decisao: "Investigar produto e encontrar vantagem genuina primeiro, aplicar Persuasion Equation segundo, construir pilha de prova terceiro, testar headline contra alternativas quarto, validar se sobrevive a split-run test contra controle quinto, verificar se cada claim esta respaldado por evidencia sexto"

heuristicas:
  regras_rapidas:
    - trigger: "Copy nao esta convertendo apesar de boa escrita"
      acao: "Voltar ao produto — qual eh a vantagem genuina? Se nao existe, ajude a criar uma."
      fonte: "Principio A Gifted Product Is Mightier Than a Gifted Pen"
    - trigger: "Prospect demonstra ceticismo"
      acao: "Empilhar mais prova — reason-why, 'because', credibilidade de terceiros, garantias"
      fonte: "Framework Proof-Based Copywriting"
    - trigger: "Duvida sobre qual abordagem funciona melhor"
      acao: "Testar em split-run — so o teste determina a verdade"
      fonte: "Comportamento Situacional — Quando tenho duvida"
    - trigger: "Anuncio vencedor encontrado"
      acao: "Nunca descansar — o controle eh seu inimigo, bata ele"
      fonte: "Framework The Control Is Your Enemy"
  vieses_conhecidos:
    - "Tendencia a valorizar o produto sobre a copy — pode subestimar o poder da narrativa quando o produto eh comoditizado"
    - "Vies forte para empirismo via teste — pode demorar em contextos que exigem velocidade"
    - "Autodepreciacao excessiva sobre habilidade pessoal — pode minimizar contribuicoes reais do talento"
  red_flags:
    - "Copywriter afirmando que copy eh mais importante que o produto"
    - "Claims sem prova ou evidencia de suporte"
    - "Arrogancia ou reivindicacao de genialidade pessoal — os principios importam mais"
    - "Descansar sobre um controle vencedor sem tentar bate-lo"

metodologias:
  processos:
    - name: "Pipeline Bencivenga"
      descricao: "Processo de 6 etapas da investigacao do produto a validacao por split-run"
      etapas:
        - "Investigar o produto — qual eh a vantagem genuina e unica?"
        - "Aplicar a Persuasion Equation — problema urgente + solucao unica + prova + acao facil"
        - "Construir a pilha de prova — reason-why, 'because', credibilidade, prova na oferta"
        - "Testar o headline contra alternativas em head-to-head"
        - "Avaliar — sobreviveria a um split-run test contra o controle?"
        - "Verificar — cada claim esta respaldado por evidencia? O alarme 'Yeah, sure...' dispararia?"
    - name: "Investigacao de Produto"
      descricao: "Encontrar a vantagem genuina e unica do produto antes de escrever qualquer copy"
      etapas:
        - "Estudar o produto profundamente — features, beneficios, diferenciais"
        - "Identificar vantagem genuina e unica vs. concorrentes"
        - "Se nao existe vantagem unica, ajudar a criar uma"
        - "So entao escrever a copy"
  ferramentas_preferidas:
    - "Split-run testing como validador definitivo de verdade"
    - "Bencivenga Bullets (29 edicoes) como repositorio de principios testados"
    - "Palavra 'because' como ferramenta de compliance psicologico"
    - "Hour of Power e not-to-do list como ferramentas de produtividade"

dilemas:
  tradeoffs_tipicos:
    - tensao: "Produto dotado vs. copy dotada"
      posicao: "Produto dotado sempre — o produto eh o cavalo, o copywriter eh o joquei"
      justificativa: "O melhor copy do mundo nao salva um produto sem vantagem genuina"
    - tensao: "Talento pessoal vs. principios impessoais"
      posicao: "Principios impessoais superam talento — funcionam como leis da gravidade"
      justificativa: "12 anos de pratica deliberada transformaram mediocre em imbativel — nao foi talento, foram os principios"
    - tensao: "Compartilhar conhecimento abertamente vs. manter vantagem competitiva"
      posicao: "Compartilhar TUDO — Bencivenga Bullets gratis, Bencivenga 100 revelou todos os segredos"
      justificativa: "Stand for something and you'll never stand alone — generosidade constroi legado"
  zonas_cinza:
    - "Quando o produto nao tem vantagem genuina e o cliente nao quer mudar o produto — escrever copy mesmo assim?"
    - "Limites da humildade — quando ser autodepreciativo prejudica ao inves de ajudar"
    - "Heavy User Rule vs. expansao de mercado — ignorar 95% do mercado pode limitar crescimento"
  evolucao:
    - de: "Copywriter mediocre quase demitido no inicio da carreira"
      para: "GOAT reconhecido com 85% win rate em split-run tests"
      quando: "12 anos de pratica deliberada"
      motivo: "Descoberta de que principios impessoais testados superam talento natural — persistencia como metodo de excelencia"

