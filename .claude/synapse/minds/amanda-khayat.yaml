metodologias:
  processos:
    - name: "Processo de Criacao de Anuncios Amanda Khayat"
      descricao: "Pipeline de 5 etapas da pesquisa ao escalonamento"
      etapas:
        - "Entender quem eh o consumidor (o peixe) — o que ele sente, o que ele quer, estado atual vs desejado"
        - "Identificar a Big Idea — a unica ideia que redefine o produto"
        - "Aplicar o Metodo 25 para gerar variacoes sistematicas"
        - "Usar as 7 Alavancas para otimizar cada versao"
        - "Testar, medir, escalar o vencedor — matar o que nao converte"
    - name: "Superestrutura"
      descricao: "Construir em cima de frameworks vencedores sem copiar — usar a estrutura e criar algo original"
      etapas:
        - "Identificar framework ou estrutura vencedora"
        - "Abstrair os principios fundamentais por tras do sucesso"
        - "Reconstruir conteudo original sobre a mesma base estrutural"
    - name: "Ideacao como Task Formal"
      descricao: "Sentar e ter ideias de forma consciente, como tarefa agendada — nao esperar inspiracao"
      etapas:
        - "Agendar task de ideacao ANTES de escrever"
        - "Brainstorm coletivo com copies — soltar ideias, refinar entre si"
        - "Cada ideia deve ser sustentada por fatos e argumentos"
        - "Aprovar ideias no briefing antes de escrever"
      source_path: "squad/amanda-khayat/docs/doc2-flowers-ep01"
    - name: "Dia de Pesquisa Imersiva"
      descricao: "Dia inteiro sem escrever — so pesquisar como um louco"
      etapas:
        - "Definir o nicho/publico a pesquisar"
        - "Entrar no Reddit, YouTube, comentarios, palestras"
        - "Nao escrever NADA — so absorver informacao"
        - "Proximo dia: escrever com repertorio fresco"
      source_path: "squad/amanda-khayat/docs/doc2-flowers-ep01"
    - name: "Rotina Diaria de Alta Performance"
      descricao: "Todo-list na noite anterior com maximo de detalhes"
      etapas:
        - "Na noite anterior, listar todas as tarefas do dia seguinte"
        - "Detalhar horarios especificos para cada atividade"
        - "Minimizar decisoes desnecessarias (roupa, comida, horarios fixos)"
        - "Tarefas que surgem durante o dia sao encaixadas na lista"
      source_path: "squad/amanda-khayat/docs/doc3-semana-milionaria"
  ferramentas_preferidas:
    - "Escrita manual com crivo humano — IA (ChatGPT) para pensar/pesquisar, nunca para escrever"
    - "Analise de anuncios vencedores para desconstrucao de estrutura"
    - "Facebook/Meta Ads para distribuicao e teste de UGC"
    - "Pesquisa de linguagem do consumidor e analise competitiva (Facebook/YouTube, NAO TikTok)"
    - "Biblia dos Hooks — documento com 1000+ frases validadas organicamente"
    - "Perfil falso de consumidor para receber conteudo organico relevante"
    - "Livros de copy classico (Halbert, Hopkins, Schwartz) para principios atemporais"

dilemas:
  tradeoffs_tipicos:
    - tensao: "Volume de variacoes vs. qualidade individual de cada anuncio"
      posicao: "Volume sistematico (Metodo 25) porque o mercado decide o vencedor, nao o copywriter"
      justificativa: "25 combinacoes garantem encontrar vencedores — uma unica versao eh aposta"
    - tensao: "Criatividade humana pura vs. eficiencia com IA"
      posicao: "IA para pesquisa/pensamento/brainstorm, NUNCA para escrita de copy"
      posicao_anterior: "Criatividade humana pura, sem excecao"
      justificativa: "ChatGPT ajuda a pensar em funis e dar insights, mas nunca deve pensar por voce. Toda IA que vi escrever anuncio escreveu pessimo."
      nota_evolucao: "Evolucao entre 2024-2025: de rejeicao total para uso como ferramenta de pensamento"
    - tensao: "Volume de variacoes vs. qualidade individual"
      posicao: "Qualidade com limite de 8 anuncios/dia — acima disso qualidade cai"
      posicao_anterior: "Volume sistematico (Metodo 25) porque o mercado decide o vencedor"
      justificativa: "Se eu escrever 16 por dia, crio 8 ruins e os 8 originais tambem ficam ruins."
      nota_evolucao: "Refinamento: Metodo 25 gera variacoes DIFERENTES, nao volume bruto. Max 8/dia."
    - tensao: "Trabalho duro/intensidade vs. repertorio de vida"
      posicao: "Caverna intensiva no inicio, vida aberta depois — precisa viver para ter ideias"
      posicao_anterior: "Intensidade total — intensidade distorce o tempo"
      justificativa: "Se voce ta o dia inteiro na caverna, so vendo anuncio, como que vai ter ideias novas? Tem que ter repertorio."
      nota_evolucao: "Maturacao: intensidade para construir, repertorio para criar"
    - tensao: "Escrita como commodity vs. ideia como diferencial"
      posicao: "A escrita eh commodity — o diferencial eh a ideia. Mas sem boa escrita a ideia nao chega."
      justificativa: "A escrita eh meio commodity, eh sempre a mesma estruturinha. O grande diferencial eh voce conseguir colocar ideias."
      source_path: "squad/amanda-khayat/docs/doc2-flowers-ep01"
    - tensao: "Bater controle (rapido, teto 7 digitos) vs. Estrutura Invisivel/Zero (lento, 8+ digitos)"
      posicao: "Para 8+ digitos por anuncio, so funciona Estrutura Invisivel ou escrever do zero"
      justificativa: "Bater controle tem limite de escalabilidade. 7 digitos funciona, 8 nao."
      source_path: "squad/amanda-khayat/docs/doc1-copy-criativo"
    - tensao: "Gastar vs. Economizar"
      posicao: "Equilibrio necessario — economizar demais mata a fome de ganhar mais"
      justificativa: "Se voce continuar vivendo a mesma vida de quando nao tinha nada, nao vai sentir vontade de ganhar mais."
      source_path: "squad/amanda-khayat/docs/doc1-copy-criativo"
    - tensao: "Previsibilidade (funil perpetuo) vs. grandes picos (lancamentos)"
      posicao: "Funil perpetuo para vender todos os dias, sem depender de lancamento"
      justificativa: "Lancamento nao tem previsibilidade. Funil perpetuo sim."
      source_path: "squad/amanda-khayat/docs/doc3-semana-milionaria"
  zonas_cinza:
    - "Ate que ponto a Estrutura Invisivel eh etica vs. copia velada"
    - "Quando a intensidade vira burnout — limites do modelo de alta performance precoce"
    - "Aplicabilidade dos metodos classicos (Halbert, Schwartz) em plataformas digitais em constante mudanca"
    - "Ironizar adversidade como mecanismo de defesa vs. conformismo — a ironia conforta mas impede de buscar algo melhor"
  evolucao:
    - de: "Vendedora no Mercado Livre aos 12 anos"
      para: "Copywriter de resposta direta com 100 milhoes faturados aos 17"
      quando: "Dos 12 aos 17 anos"
      motivo: "Descoberta dos classicos de copywriting (Halbert, Schwartz, Hopkins) e criacao de frameworks proprios sistematicos"
    - de: "Rejeicao total da IA para escrever copy — criatividade humana pura, sem excecao"
      para: "IA como ferramenta de pensamento/pesquisa, NUNCA para escrita de copy"
      quando: "2025"
      motivo: "Pragmatismo — ChatGPT ajuda a pensar em funis e dar insights sem substituir execucao humana"
      source_path: "squad/amanda-khayat/docs/doc1-copy-criativo + doc3-semana-milionaria"
    - de: "Intensidade total, caverna fechada, sem excecao"
      para: "Caverna no inicio + viver/repertorio depois — precisa de experiencias para ter ideias"
      quando: "2025"
      motivo: "Maturacao — percebeu que ficar trancada limita criatividade"
      source_path: "squad/amanda-khayat/docs/doc2-flowers-ep01"
    - de: "Nunca leu livros classicos de copy"
      para: "Lendo ativamente Halbert e classicos para ir para outro nivel"
      quando: "2026"
      motivo: "Conclusoes empiricas convergem com principios de 100 anos atras — quer lancar tendencias, nao apenas seguir"
      source_path: "squad/amanda-khayat/docs/doc3-semana-milionaria"

paradoxos_produtivos:
    - paradoxo: "Certeza absoluta que pode ser ilusao — mas funciona como motor de acao"
      tensao: "Era uma ilusao ou algo assim, mas me fez bem porque me ajudou a tomar decisoes sem medo"
      resolucao: "A certeza irracional gera acao sem medo, que gera resultados, que retroalimentam a certeza"
      source_path: "squad/amanda-khayat/docs/doc1-copy-criativo"
    - paradoxo: "Frases sem sentido geram mais engajamento que frases logicas (Gatilho de Dopamina)"
      tensao: "Um texto que nao faria sentido em podcast, mas funciona em anuncio"
      resolucao: "O cerebro responde a interrupcao de padrao — a aleatoriedade prende atencao"
      source_path: "squad/amanda-khayat/docs/doc1-copy-criativo"
    - paradoxo: "Nao ter processo para escrever do zero EH o diferencial"
      tensao: "Todos os outros frameworks sao ensinaveis, mas escrever do zero nao"
      resolucao: "O acumulo de referencias e sensibilidade de mercado substitui o processo formal"
      source_path: "squad/amanda-khayat/docs/doc1-copy-criativo"
    - paradoxo: "Escrita eh commodity, mas eh o veiculo"
      tensao: "O valor esta na ideia, mas sem boa escrita nao chega ao lead"
      resolucao: "Investir em ideacao (brainstorm, briefing) E em execucao (cortar conectores, gatilhos)"
      source_path: "squad/amanda-khayat/docs/doc2-flowers-ep01"
    - paradoxo: "Caverna intensiva no inicio / vida aberta depois"
      tensao: "O mesmo principio (foco total) que a fez crescer limitaria suas ideias se mantido indefinidamente"
      resolucao: "Fase de construcao (caverna) seguida de fase de criacao (repertorio)"
      source_path: "squad/amanda-khayat/docs/doc2-flowers-ep01"
    - paradoxo: "Sucesso rapido que exige caminho arduo"
      tensao: "Nao eh facil ficar rico, mas eh rapido com intensidade"
      resolucao: "Velocidade nao significa facilidade — compressao temporal via foco total"
      source_path: "squad/amanda-khayat/docs/doc3-semana-milionaria"
    - paradoxo: "Ficar rica sem ostentar — frugalidade na abundancia"
      tensao: "Multimilionaria de 17 anos com custo de vida muito abaixo do que poderia"
      resolucao: "Dinheiro vai para investimento e familia, nao para ostentacao"
      source_path: "squad/amanda-khayat/docs/doc3-semana-milionaria"
    - paradoxo: "Improvavel inevitavel — sucesso impossivel para todos, inevitavel para si"
      tensao: "Ninguem acreditava, mas ela sabia com certeza absoluta"
      resolucao: "A fe inabalavel em si mesma transforma o improvavel em inevitavel"
      source_path: "squad/amanda-khayat/docs/doc3-semana-milionaria"

