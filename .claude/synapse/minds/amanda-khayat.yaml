frameworks:
  primarios:
    - name: "Metodo 25"
      steps:
        - "Definir 5 tipos de ganchos: organico, validado, estrutura invisivel, do zero, de outro nicho"
        - "Definir 5 tipos de corpo de anuncio"
        - "Cruzar ganchos x corpos para gerar 25 combinacoes unicas por produto"
        - "Testar todas as combinacoes para encontrar vencedores"
      quando_usar: "Para gerar variacoes sistematicas de anuncios para qualquer produto"
    - name: "7 Alavancas para Bater Controle"
      steps:
        - "Formato/Avatar"
        - "Hook Visual + Escrito"
        - "Frase de Pouso"
        - "Congruencia"
        - "Contexto do Avatar"
        - "Gatilho de Dopamina"
        - "Fechamento do Anuncio"
      quando_usar: "Para superar o melhor anuncio existente (o controle) mudando alavancas especificas"
    - name: "Estrutura Invisivel"
      steps:
        - "Encontre o anuncio vencedor (o controle)"
        - "Tire o conteudo de superficie"
        - "Identifique a estrutura por baixo"
        - "Reconstrua um anuncio novo usando a mesma estrutura com conteudo diferente"
      quando_usar: "Para desconstruir anuncios vencedores e criar novos a partir da mesma arquitetura"
    - name: "Big Idea (Schwartz)"
      steps:
        - "Identificar o desejo central do consumidor"
        - "Encontrar UMA ideia que redefine o produto na mente do consumidor"
        - "Construir todo o anuncio ao redor dessa unica ideia"
      quando_usar: "Em todo anuncio — sem Big Idea, o anuncio eh generico"
      exemplo: "Lei do Japao — regra proibindo mulheres de engordar + produto de emagrecimento = Big Idea que liga cultura a produto"
      source_path: "squad/amanda-khayat/docs/doc2-flowers-ep01"
    - name: "Gatilho de Dopamina"
      steps:
        - "Inserir frases aparentemente aleatorias/desconectadas no meio do anuncio"
        - "Cada frase deve gerar surpresa, curiosidade ou satisfacao"
        - "Nao eh procedural (nao a cada X segundos) — eh por intuicao"
        - "Pode usar frases da Biblia dos Hooks como gatilho"
      quando_usar: "Ao longo do corpo do anuncio para manter atencao e impedir saida antes do CTA"
      exemplo: "'Perdi um quilo em um mes. Nunca vi nada tao forte. Mais forte que a caneta Montejaro.'"
      source_path: "squad/amanda-khayat/docs/doc1-copy-criativo"
    - name: "Frase de Pouso (Landing Phrase)"
      steps:
        - "Posicionar imediatamente apos o hook"
        - "Deve ser tao forte quanto o proprio gancho"
        - "Funcao: abrir um ciclo de curiosidade/controversia que ancora o espectador"
        - "Ignorada por 99% dos copywriters — diferencial competitivo"
      quando_usar: "Em todo anuncio em video — a ponte entre o hook e o corpo do anuncio"
      source_path: "squad/amanda-khayat/docs/doc1-copy-criativo"
    - name: "Promessa/Prova/Curiosidade"
      steps:
        - "Classificar cada frase do anuncio em um dos tres elementos"
        - "Promessa: o que o produto vai fazer pelo consumidor"
        - "Prova: evidencia de que funciona (dados, testimonials, autoridade)"
        - "Curiosidade: elemento que gera vontade de saber mais"
        - "As melhores frases combinam dois ou tres elementos"
      quando_usar: "Para analisar e otimizar cada linha de um anuncio existente"
      source_path: "squad/amanda-khayat/docs/doc1-copy-criativo"
    - name: "Autoridade Humanizada"
      steps:
        - "No final do anuncio, usar declaracao pessoal sincera"
        - "Mais poderosa que provas formais (estudos, numeros)"
        - "Formato: 'Eu nao viria aqui colocar minha reputacao em jogo para dizer algo que nao funciona'"
      quando_usar: "Como fechamento alternativo ao CTA tradicional — gera confianca visceral"
      source_path: "squad/amanda-khayat/docs/doc1-copy-criativo"
    - name: "Push-Pull (atracao-repulsao)"
      steps:
        - "Passar o anuncio inteiro convencendo"
        - "No fechamento, dar impressao de que nao tem interesse"
        - "Formato: 'Tanto faz. Nao ganho nada com isso, a escolha eh sua.'"
      quando_usar: "No fechamento do anuncio — reduz resistencia do consumidor ao fazer parecer que nao esta vendendo"
      source_path: "squad/amanda-khayat/docs/doc1-copy-criativo"
    - name: "Briefing Pre-Escrita em 4 Componentes"
      steps:
        - "Definir a Big Idea do anuncio"
        - "Definir avatar (quem fala, quem e a pessoa)"
        - "Justificar por que esta ideia e este avatar"
        - "Aprovar brief ANTES de abrir o documento para escrever"
      quando_usar: "Obrigatorio antes de escrever qualquer anuncio — todo copy faz briefing antes"
      source_path: "squad/amanda-khayat/docs/doc2-flowers-ep01"
    - name: "Entender POR QUE funciona (vs replicar O QUE funciona)"
      steps:
        - "Analisar anuncio que funciona"
        - "Perguntar: POR QUE este gancho/avatar/angulo funciona?"
        - "Chegar na resposta do mecanismo psicologico"
        - "Criar algo NOVO que gere o mesmo efeito"
      quando_usar: "Sempre que analisar anuncios — nao replicar cegamente, entender o mecanismo"
      source_path: "squad/amanda-khayat/docs/doc2-flowers-ep01"
    - name: "Estudar Classicos para Lancar Tendencias"
      steps:
        - "Ler livros de copy classico (Halbert, Hopkins, Schwartz)"
        - "Extrair principios que eram validos ha 100 anos"
        - "Identificar o que ninguem esta aplicando hoje"
        - "Adaptar e aplicar nos anuncios modernos"
      quando_usar: "Para ir alem do que o mercado atual faz — lancar tendencias em vez de seguir"
      source_path: "squad/amanda-khayat/docs/doc3-semana-milionaria"
  modelo_decisao: "Espionagem de mercado primeiro, entender o consumidor (o peixe) segundo, identificar a Big Idea terceiro, validar no briefing quarto, aplicar Metodo 25 para gerar variacoes quinto, usar 7 Alavancas e Frase de Pouso para otimizar sexto, testar e escalar setimo"

