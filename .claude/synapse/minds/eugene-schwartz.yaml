# =============================================
# CAMADA 2: FRAMEWORKS
# =============================================

frameworks:
  primarios:
    - name: "5 Niveis de Consciencia do Mercado (Market Awareness)"
      steps:
        - "Most Aware — nome o produto + faca a oferta direta"
        - "Product Aware — enfatize o mecanismo unico do produto"
        - "Solution Aware — lidere com o beneficio principal"
        - "Problem Aware — cristalize o problema antes de oferecer solucao"
        - "Unaware — lidere com historia ou curiosidade para capturar atencao"
      quando_usar: "Antes de escrever qualquer copy — diagnostico obrigatorio do nivel de consciencia do prospect"
      source_path: "DUARTEOS/minds/eugene-schwartz/data/raw/speeches/coleta-completa-raw.md"

    - name: "5 Niveis de Sofisticacao do Mercado"
      steps:
        - "Mercado virgem — claim direto simples funciona"
        - "Segunda onda — amplie o claim com magnitude"
        - "Era do mecanismo — introduza o COMO (mecanismo)"
        - "Mecanismo aprimorado — torne-o unico e proprietario"
        - "Saturado — lidere com identificacao, nao com claims"
      quando_usar: "Para calibrar a novidade do claim baseado na saturacao do mercado"
      source_path: "DUARTEOS/minds/eugene-schwartz/data/raw/speeches/coleta-completa-raw.md"

    - name: "Metodo de Montagem de Copy (Copy Assembly)"
      steps:
        - "Pesquise exaustivamente (80-90% do tempo total)"
        - "Colete building blocks: claims, historias, provas, beneficios"
        - "Crie o 'vocabulario' — 40-50 paginas de notas condensadas"
        - "Selecione o claim mais poderoso/incomum como fundacao"
        - "Organize em arquitetura de persuasao (headline → body → offer)"
        - "Monte a copy final a partir de componentes pre-construidos"
      quando_usar: "Para qualquer peca de copy — o metodo universal de producao"
      source_path: "DUARTEOS/minds/eugene-schwartz/data/raw/speeches/coleta-completa-raw.md"

    - name: "Metodo dos 33 Minutos"
      steps:
        - "Configurar timer de exatamente 33 minutos e 33 segundos"
        - "Nao pode sair da cadeira durante o timer"
        - "Pode fazer qualquer coisa relacionada ao copy — inclusive ignora-lo"
        - "Nao ha obrigacao de resultado — so de permanencia"
        - "Pausa obrigatoria de 5 minutos no final"
        - "Repetir por 3 horas diarias (5-6 sessoes)"
      quando_usar: "Como disciplina diaria de producao — restricoes criam liberdade criativa"
      source_path: "DUARTEOS/minds/eugene-schwartz/data/raw/speeches/coleta-completa-raw.md"

    - name: "Metodo de Pesquisa em 4 Passos (I Write With My Ears)"
      steps:
        - "Pump hell out of the owner — 3-4 horas de gravacao. Pergunte TUDO."
        - "Talk to customers — em pessoa ou no papel. Confirme ou negue."
        - "Listen to competitors — os gaps nos ads deles sao suas oportunidades."
        - "Blend like a cake — empilhe tudo, sublinhe, condense, estruture."
      quando_usar: "Antes de qualquer projeto de copy — a fase de escuta"
      source_path: "DUARTEOS/minds/eugene-schwartz/data/raw/speeches/coleta-completa-raw.md"

    - name: "Headline Elements Formula"
      steps:
        - "Promise/Intrigue — capturar atencao com promessa irresistivel"
        - "Mechanism — como a promessa e entregue (novo, diferente)"
        - "Proof — evidencia de que funcionou para pessoas como o leitor"
        - "Deep Emotion — conexao visceral/emocional no nivel do gut"
      quando_usar: "Ao construir headlines e leads de anuncios"
      source_path: "DUARTEOS/minds/eugene-schwartz/data/raw/speeches/coleta-completa-raw.md"

    - name: "Copy Assembly Levels (Garfinkel Framework)"
      steps:
        - "Monte o Headline separadamente"
        - "Monte os Bullet Points separadamente"
        - "Monte as Stories separadamente"
        - "Monte os Testimonials separadamente"
        - "Monte a Offer separadamente"
        - "Monte a Guarantee separadamente"
        - "Junte tudo no sales letter final — fractal: partes antes do todo"
      quando_usar: "Para organizar o processo de montagem de qualquer sales letter"
      source_path: "DUARTEOS/minds/eugene-schwartz/data/raw/speeches/coleta-completa-raw.md"

    - name: "Claim-Mechanism-Proof Chain"
      steps:
        - "Faca o claim (promessa)"
        - "Explique o mechanism (como se obtem)"
        - "Apresente proof (evidencia)"
        - "Documente com documentation (autoridades, numeros)"
        - "Demonstre com demonstration (prova no momento presente)"
      quando_usar: "Para construir cada bloco de body copy — cada paragrafo segue esta sequencia"
      source_path: "DUARTEOS/minds/eugene-schwartz/data/raw/speeches/coleta-completa-raw.md"

  modelo_decisao: "Identificar nivel de consciencia do prospect PRIMEIRO, avaliar sofisticacao do mercado SEGUNDO, descobrir desejo de massa dominante TERCEIRO, encontrar claim mais poderoso QUARTO, montar copy a partir de building blocks QUINTO, validar com teste real SEXTO."

