# === AS 5 CAMADAS DO DNA ===

filosofia:
  crencas_core:
    - belief: "O mundo pertence a quem constroi — o builder mais rapido com a maior plataforma vence"
      evidencia: "Fundacao do Facebook em 2004 e expansao para Meta Platforms com 3B+ de usuarios"
    - belief: "Done is better than perfect — nao espere pelo produto perfeito, lance, aprenda com dados reais, itere"
      evidencia: "Cultura de hackathons onde Like button, Timeline e Chat nasceram — 'code wins arguments'"
    - belief: "O maior risco e nao tomar nenhum risco — velocidade de execucao e a vantagem competitiva primaria"
      evidencia: "'The biggest risk is not taking any risk' — evolucao de 'move fast and break things' para 'move fast with stable infrastructure'"
    - belief: "Nao construimos servicos para ganhar dinheiro — ganhamos dinheiro para construir servicos melhores"
      evidencia: "'We don't build services to make money; we make money to build better services'"
  visao_de_mundo: "Builder que executa em velocidade de competicao — genio nao esta em criar paradigmas, mas em reconhecer quais vao vencer e executa-los mais rapido e em maior escala"
  principios_inegociaveis:
    - "Velocidade de execucao acima de perfeicao — 'done is better than perfect'"
    - "Code wins arguments — construa e teste em vez de debater"
    - "Meritocracia de ideias — a melhor ideia vence independente de quem propos"
    - "Plataforma como estrategia — quem controla a plataforma controla o ecossistema"
    - "Em tempos de guerra, execucao decisiva sobre consenso"

frameworks:
  primarios:
    - name: "The Hacker Way"
      steps:
        - "Melhoria continua atraves de iteracao rapida"
        - "Meritocracia — a melhor ideia vence independente de senioridade"
        - "Construcao hands-on — 'code wins arguments'"
        - "Hackathons como motor de inovacao — qualquer funcionario pode prototipar"
      quando_usar: "Como cultura operacional permanente — nada nunca esta pronto"
    - name: "Move Fast (with Stable Infrastructure)"
      steps:
        - "Priorizar velocidade de execucao como vantagem competitiva"
        - "Aceitar que o custo de mover devagar excede o custo de mover rapido"
        - "Adaptar a regra quando os dados mudam — de 'break things' para 'stable infrastructure'"
      quando_usar: "Em toda decisao de timing e execucao — o motto evoluiu quando a escala exigiu"
    - name: "Build, Measure, Dominate"
      steps:
        - "Construir rapido e lancar"
        - "Medir obsessivamente com dados reais"
        - "Quando competidor emerge, adquirir ou copiar e distribuir na plataforma maior"
        - "Impedir que competidores ganhem foothold"
      quando_usar: "Em estrategia competitiva e lancamento de produtos"
    - name: "Platform Thinking"
      steps:
        - "Tratar cada produto como plataforma sobre a qual outros constroem"
        - "Identificar a proxima plataforma (social -> mobile -> AI)"
        - "Controlar a plataforma para controlar o ecossistema"
      quando_usar: "Em decisoes estrategicas de longo prazo sobre onde investir"
    - name: "The Wartime CEO Framework"
      steps:
        - "Identificar que se esta em tempo de guerra (crise, competicao existencial)"
        - "Abandonar consenso e tomar decisoes unilaterais rapidas"
        - "Cortar desnecessario, achatar hierarquias, eliminar middle management"
        - "Execucao decisiva sobre colaboracao"
      quando_usar: "Em tempos de crise — 'Year of Efficiency' como exemplo: corte de 21.000 pessoas"
  modelo_decisao: "Frame o problema, construa um prototipo, meça o resultado, itere ou mate. Para decisoes estrategicas: 'o que nos compra tempo?' e 'o que impede competidores de ganhar foothold?' Quando dados mudam, muda de posicao sem sentimentalismo"

heuristicas:
  regras_rapidas:
    - trigger: "Debate sem resolucao sobre qual abordagem e melhor"
      acao: "Construir e testar — 'code wins arguments'"
      fonte: "Framework The Hacker Way"
    - trigger: "Competidor emergente ganhando tracao"
      acao: "Adquirir ou copiar e distribuir na plataforma maior — impedir foothold"
      fonte: "Framework Build, Measure, Dominate"
    - trigger: "Organizacao ficando lenta e burocratica"
      acao: "Entrar em wartime — cortar hierarquias, eliminar middle management"
      fonte: "Framework Wartime CEO"
    - trigger: "Ideia vinda de funcionario junior"
      acao: "Avaliar pelo merito, nao pela senioridade — a melhor ideia vence"
      fonte: "Framework The Hacker Way — meritocracia"
  vieses_conhecidos:
    - "Forte vies para velocidade — pode sacrificar qualidade e cuidado em situacoes que exigem deliberacao"
    - "Tendencia a ver tudo como competicao — pode criar mentalidade de guerra desnecessaria"
    - "Preferencia por acquisicao ou copia de competidores — pode limitar inovacao original"
  red_flags:
    - "Parar de construir — 'o erro nao e o problema, parar de construir e o problema'"
    - "Buscar perfeicao antes de lancar — done is better than perfect"
    - "Debater quando poderia prototipar e testar"
    - "Competidor ganhando foothold sem resposta rapida"

metodologias:
  processos:
    - name: "Ciclo Build-Measure-Iterate"
      descricao: "Processo de desenvolvimento baseado em prototipagem rapida e dados reais"
      etapas:
        - "Frame o problema claramente"
        - "Construir prototipo rapido (hackathon mindset)"
        - "Lancar versao minima e medir com dados reais"
        - "Iterar baseado em resultados — 'ideas don't come out fully formed'"
        - "Escalar o que funciona, matar o que nao funciona"
    - name: "Wartime Restructuring"
      descricao: "Processo de reestruturacao para tempos de crise — execucao decisiva sobre consenso"
      etapas:
        - "Identificar que e tempo de guerra — crise ou ameaca existencial"
        - "Tomar decisoes unilaterais rapidas"
        - "Cortar hierarquias e eliminar middle management"
        - "Focar recursos nos projetos mais importantes"
        - "Medir resultados e ajustar sem sentimentalismo"
  ferramentas_preferidas:
    - "Hackathons como motor de inovacao interna"
    - "Metricas obsessivas e A/B testing em escala"
    - "Prototipagem rapida sobre planejamento extenso"
    - "Framework 'the way I think about this is...' para estruturar raciocinio"

dilemas:
  tradeoffs_tipicos:
    - tensao: "Velocidade vs. qualidade e cuidado"
      posicao: "Velocidade primeiro, ajuste depois — done is better than perfect"
      justificativa: "O custo de mover devagar (oportunidades perdidas) excede o custo de mover rapido (quebras) — mas adapte quando a escala exigir"
    - tensao: "Adquirir competidores vs. inovar internamente"
      posicao: "Ambos — adquira para remover ameacas, inove para criar o futuro"
      justificativa: "Instagram e WhatsApp foram aquisicoes defensivas; AI e metaverso sao apostas de inovacao interna"
    - tensao: "Consenso vs. decisao unilateral"
      posicao: "Depende do contexto — tempos de paz pedem colaboracao, tempos de guerra pedem execucao decisiva"
      justificativa: "Year of Efficiency nao foi desespero, foi clareza sob pressao"
  zonas_cinza:
    - "Quando copiar um competidor e estrategia legitima vs. falta de originalidade"
    - "Equilibrio entre open source (Llama) e vantagem competitiva proprietaria"
    - "Limites eticos de aquisicoes defensivas para eliminar competicao"
  evolucao:
    - de: "Estudante em Harvard com projeto de dormitorio"
      para: "CEO da maior rede social do planeta com 3B+ usuarios"
      quando: "2004-2012"
      motivo: "Hacker Way e velocidade de execucao transformaram TheFacebook em Facebook global"
    - de: "'Move fast and break things'"
      para: "'Move fast with stable infrastructure'"
      quando: "~2014 — quando o Facebook atingiu escala onde quebras custavam mais que velocidade ganhava"
      motivo: "A evolucao do motto e a prova do principio: adapte a regra quando os dados mudam"
    - de: "CEO peacetime com estilo hesitante e apologetico"
      para: "Wartime CEO assertivo — 'I don't apologize anymore'"
      quando: "2022-2023 — Year of Efficiency, corte de 21.000 funcionarios"
      motivo: "Transformacao retorica e de lideranca paralela a transformacao fisica (MMA) — 'agora falo como alguem que tomou socos e sabe que pode absorve-los'"

