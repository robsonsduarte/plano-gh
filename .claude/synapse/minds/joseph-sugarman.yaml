    - name: "Slippery Slide Concept"
      steps:
        - "A primeira frase puxa para a segunda"
        - "A segunda puxa para a terceira"
        - "Cada frase aumenta o comprometimento emocional"
        - "No final, o leitor esta vendido sem perceber"
        - "Descida lisa, sem friccao, ate o 'Comprar'"
      quando_usar: "Em toda peca de copy — o principio universal de fluxo"
      source_path: "JS-SRC-014"
    - name: "30 Psychological Triggers"
      steps:
        - "Consistency — pessoas agem consistente com comprometimentos anteriores"
        - "Curiosity — loops abertos forcam continuacao da leitura"
        - "Storytelling — historias bypass a mente racional"
        - "Authority — posicao de expert aumenta confianca"
        - "Social Proof — acoes de outros validam decisao"
        - "Scarcity — disponibilidade limitada aumenta urgencia"
        - "Reciprocity — dar valor gera atencao e comprometimento"
        - "Honesty — confianca como trigger mais duradouro"
        - "Satisfaction Conviction — garantia forte remove medo"
        - "Involvement — envolver leitor no processo"
        - "Mais 20 triggers catalogados e sistematizados"
      quando_usar: "Para selecionar e sequenciar triggers apropriados para cada peca de copy"
      source_path: "JS-SRC-014"
    - name: "Buying Environment"
      steps:
        - "Layout visual que predispoe a compra"
        - "Primeiros paragrafos criam ambiente de confianca"
        - "Harmonia entre design e copy"
        - "Leitor se sente em loja premium, nao em bazar"
      quando_usar: "Para estruturar o ambiente visual e textual que envolve a copy"
      source_path: "JS-SRC-014"
    - name: "Concept Selling"
      steps:
        - "Identifique o conceito MAIOR (nao features, nao preco)"
        - "Reframe o produto como representante desse conceito"
        - "Crie narrativa em torno do conceito"
        - "Estabeleca categoria propria que voce domina"
      quando_usar: "Para posicionar produto de forma unica que evita comparacao direta"
      source_path: "JS-SRC-014"
    - name: "Success Forces (Seven Forces of Success)"
      steps:
        - "Always Be Honest — forca mais poderosa"
        - "Cherish Your Failures — fracasso eh success force"
        - "Relish Your Problems — oportunidade eclipsa problema"
        - "Concentrate Your Powers — foco solido"
        - "Do It Differently — copiar eh failure force"
        - "Clear Your Desk — organizacao = eficiencia"
        - "Focus on Helping Others — altruismo como forca"
      quando_usar: "Para decisoes de vida e negocios"
      source_path: "JS-SRC-015"
    - name: "Incubation Process"
      steps:
        - "Pesquise o produto profundamente"
        - "Absorva tudo sobre mercado e consumidor"
        - "Afaste-se — va fazer outra coisa"
        - "Seu cerebro trabalha 24/7 em background"
        - "Capture a ideia quando vier — sem editar"
        - "Edite depois com as menores palavras possiveis"
      quando_usar: "Quando travado no processo criativo"
      source_path: "JS-SRC-014"
    - name: "Reverse Psychology Ad"
      steps:
        - "Identifique o que eh genuinamente fraco no produto"
        - "Exponha os defeitos honestamente no inicio"
        - "Leitor pensa: por que estao me dizendo isso?"
        - "Revele a feature forte escondida"
        - "Confianca 100% porque voce foi honesto sobre defeitos"
      quando_usar: "Quando produto tem feature forte escondida atras de percepcao fraca"
      source_path: "JS-SRC-001"
  modelo_decisao: "CONCEITO primeiro (ideia maior) → HISTORIA (narrativa de bonding) → TRIGGERS (sequenciamento psicologico) → SLIDE (fluxo escorregadio) → BUYING ENV (ambiente conducente) → TESTE (nunca escalar sem dados)"

