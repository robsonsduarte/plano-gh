        - "Tome decisoes data-driven baseadas em contribuicao real"
      quando_usar: "Para decisoes de alocacao de budget entre canais e avaliacao de performance real"
    - name: "Creative Analysis (Convert vs Burn)"
      steps:
        - "Classifique criativos: Winners (CPA abaixo target, ROAS acima 3.0), Learners (CPA medio), Losers (queima verba)"
