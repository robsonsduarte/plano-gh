        - "Se LTV menor que 3.0x CAC, NAO escale — fix unit economics primeiro"
        - "Otimize alavancas: aumente LTV (upsell, cross-sell, programa fidelidade)"
        - "Diminua CAC (segmentacao por valor, remarketing hipersegmentado)"
        - "Reduza churn (onboarding, CRM ativo)"
        - "Escale inteligentemente — 10% por semana se metricas seguram"
      quando_usar: "Antes de qualquer decisao de escala em ecommerce ou infoprodutos"
