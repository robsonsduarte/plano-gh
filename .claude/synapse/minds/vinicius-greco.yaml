        - "ROAS aparente de 5.0 nao significa nada se tem churn alto, CAC crescente, LTV caindo"
        - "Reconcilie diariamente: ad spend, vendas, reembolsos, taxas, churn, margem, cash flow"
      quando_usar: "Em toda avaliacao de performance — a unica metrica que importa eh cash flow real"
    - name: "Duplicacao Inteligente"
      steps:
        - "Nao duplicar campanha 10x de uma vez"
        - "Duplicar 10% por semana, monitorar metricas"
        - "Escalar conforme cash flow PERMITE, nao conforme ego QUER"
        - "Otimizacao perpetua vence lancamento meteorico"
      quando_usar: "Para escalar campanhas de trafego pago de forma sustentavel"
  modelo_decisao: "Calcule LTV/CAC (se abaixo de 3.0, PARE), reconcilie metricas (ROAS aparente vs real), rode MMM (contribuicao real por canal), classifique criativos (Winners/Learners/Losers), escale 10% por semana cash flow-first"

