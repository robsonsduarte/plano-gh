      quando_usar: "Para governanca e manutencao de processos em producao"
    - name: "Fail-Fast Mechanisms"
      steps:
        - "Detecte problemas no primeiro checkpoint, nao no ultimo"
        - "Fail-fast eh detection, nao ambiguidade"
        - "Rigidez no design, pragmatismo na deteccao"
      quando_usar: "No design de validacao — detectar erro cedo eh mais barato que detectar tarde"
  modelo_decisao: "Identifique todos os decision points, mapeie veto conditions para cada um, calcule checkpoint coverage, valide unidirectional flow, reporte zero wrong paths confirmed ou nao — sem meio-termo"

