        - "Implemente veto conditions que impedem transicoes para estados invalidos"
        - "Garanta unidirectional flow — forward-only com excecoes explicitas"
        - "Automatize validation gates em cada checkpoint"
        - "Versione o processo — evolucao via versioning, nunca via ajuste ad-hoc"
