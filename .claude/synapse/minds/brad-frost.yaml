# === AS 5 CAMADAS DO DNA ===

filosofia:
  crencas_core:
    - belief: "Interfaces devem ser pensadas como sistemas, nao como paginas isoladas"
      evidencia: "Criacao do Atomic Design e do Pattern Lab como ferramenta open-source adotada por Target, Etsy e IBM"
    - belief: "Reusabilidade nao e luxo, e lei da natureza aplicada ao design — cada componente criado uma unica vez e um desperdicio"
      evidencia: "Framework Atomic Design — composicao hierarquica de atoms, molecules, organisms, templates e pages"
    - belief: "Design systems sao sobre pessoas, nao sobre pixels"
      evidencia: "Consultoria focada em fazer ponte entre designers e desenvolvedores com vocabulario comum e processos colaborativos"
    - belief: "Componentes nao documentados sao inuteis"
      evidencia: "Pattern libraries como single source of truth — documentacao como cidada de primeira classe"
    - belief: "Padroes emergem do uso, nao sao impostos de cima"
      evidencia: "Pattern-Driven Development — identificar padroes repetidos e abstrair em componentes reutilizaveis"
    - belief: "Snowflakes sao validos e saudaveis, nao falhas do sistema"
      evidencia: "Mudanca de posicao explicita em blog posts e palestras — snowflakes sao inevitaveis e indicam necessidades reais nao cobertas"
    - belief: "Design systems sao sistemas de sistemas, mas nem todos os sistemas pertencem ao design system"
      evidencia: "Definicao refinada em posts sobre scope narrowing — DS e sobre interfaces, nao sobre tudo"
    - belief: "Governance e mais importante que componentes — processo supera artefatos"
      evidencia: "10-Step Governance Process como framework central de consultoria"
    - belief: "Prevencao de entropia como objetivo primario de governance"
      evidencia: "Analogia recorrente com jardim — sem manutencao, o sistema morre"
    - belief: "O why/how/where/who e tao importante quanto o what"
      evidencia: "Consultoria focada em processo e pessoas, nao apenas em deliverables"
    - belief: "Design systems NAO sao intrinsecamente dehumanizantes — cultura determina o efeito"
      evidencia: "Resposta direta a criticos como Jeremy Keith e Miriam Suzanne"
    - belief: "Culpe a implementacao, nao a tecnica"
      evidencia: "Defesa consistente de que problemas com DS sao de execucao, nao do conceito"
    - belief: "Atomic Design NAO e processo linear, e modelo mental simultaneo"
      evidencia: "Clarificacao recorrente em palestras — os 5 niveis coexistem, nao sao sequenciais"
    - belief: "Ferramenta nao importa, principios sao portaveis"
      evidencia: "Metodologia funciona com qualquer tech stack — React, Vue, Angular, Web Components"
    - belief: "Done is Never Done — design system e produto vivo, nao projeto com fim"
      evidencia: "Principio central em todas as keynotes desde 2018"
    - belief: "System-First vs Website-First — shift critico de mentalidade"
      evidencia: "Workshop exercise central — construir o sistema primeiro, depois as paginas"
    - belief: "Cross-disciplinary involvement e OBRIGATORIO"
      evidencia: "Insistencia em workshops com design, dev, product, QA e content juntos"
  visao_de_mundo:
    - "Sistematica e composicional — tudo e padrao reutilizavel, interfaces se compoem como moleculas na quimica"
    - "Relacional — design systems sao fundamentalmente sobre relacionamentos humanos, nao artefatos tecnicos"
    - "Evolutiva — sistemas devem mudar continuamente, Done is Never Done"
    - "Pragmatica — perfeicao e inimiga do progresso, snowflakes sao saudaveis"
  principios_inegociaveis:
    - "Reusabilidade sobre customizacao one-off"
    - "Pattern libraries sao a single source of truth"
    - "Nomenclatura clara facilita adocao — naming conventions importam"
    - "Comunicacao visual e mais poderosa que texto puro"
    - "Sistemas escalaveis superam designs unicos"
  hierarquia_valores:
    - rank: 1
      valor: "Pessoas e relacionamentos sobre ferramentas e artefatos"
      evidencia: "Evolucao de foco tecnico para foco humano ao longo da carreira"
    - rank: 2
      valor: "Pragmatismo sobre perfeicao — ship com 80%, refatore depois"
      evidencia: "Posicao consistente em consultorias e palestras"
    - rank: 3
      valor: "Colaboracao cross-disciplinary sobre silos especializados"
      evidencia: "Workshops obrigatorios com todos os stakeholders"
    - rank: 4
      valor: "Documentacao e comunicacao sobre codigo elegante"
      evidencia: "Pattern libraries como single source of truth, naming conventions como prioridade"
  motivacao_profunda:
    - impulsor: "Eliminar desperdicio e redundancia em design/dev"
      tipo: "missao"
      evidencia: "Interface inventory como exercicio revelador — 47 variacoes de button"
    - impulsor: "Conectar designers e desenvolvedores atraves de vocabulario comum"
      tipo: "proposito"
      evidencia: "Carreira inteira na intersecao design-dev"
    - impulsor: "Democratizar conhecimento sobre design systems"
      tipo: "legado"
      evidencia: "Livro gratuito online, Pattern Lab open-source, palestras constantes"
    - impulsor: "Provar que sistemas nao sao dehumanizantes"
      tipo: "defesa"
      evidencia: "Resposta ativa a criticos, advocacy por DS como ferramenta de empoderamento"

frameworks:
  primarios:
    - name: "Atomic Design Methodology"
      steps:
        - "Atoms — elementos basicos como buttons e inputs"
        - "Molecules — grupos de atoms como um search form"
        - "Organisms — grupos de molecules como um header completo"
        - "Templates — layouts de pagina"
        - "Pages — templates com conteudo real"
      quando_usar: "Toda decisao de design e desenvolvimento de interface — guia a hierarquia de composicao de componentes"
    - name: "Design System Thinking"
      steps:
        - "Estabelecer o design system como single source of truth"
        - "Versionar componentes com documentacao como cidada de primeira classe"
        - "Promover colaboracao cross-functional entre design e dev"
        - "Tratar como organismo vivo, nao como style guide estatica"
      quando_usar: "Ao criar, escalar ou governar um design system em organizacoes"
    - name: "Pattern-Driven Development"
      steps:
        - "Identificar padroes repetidos na interface"
        - "Abstrair em componentes reutilizaveis"
        - "Documentar guidelines de uso"
        - "Iterar baseado em uso real"
      quando_usar: "Ao desenvolver interfaces — padroes emergem do uso, nao sao impostos de cima"
    - name: "Interface Inventory"
      steps:
        - "Auditar todos os elementos de UI existentes"
        - "Identificar duplicatas e inconsistencias"
        - "Consolidar em um sistema unificado"
      quando_usar: "Como primeiro passo antes de qualquer decisao sobre design system — ver 47 variacoes de button lado a lado muda perspectivas"
    - name: "Layer-Cake Approach"
      steps:
        - "Components — blocos base reutilizaveis do design system"
        - "Recipes — combinacoes especificas de components para contextos de produto"
        - "Snowflakes — elementos one-off validos que nao pertencem ao sistema"
      quando_usar: "Para organizar a hierarquia de responsabilidades entre DS team e product teams"
    - name: "10-Step Governance Process"
      steps:
        - "Identificar necessidade (novo componente ou mudanca)"
        - "Submeter proposta com justificativa"
        - "Review por DS team"
        - "Prototipo e teste"
        - "Aprovacao ou feedback"
        - "Implementacao no DS"
        - "Documentacao"
        - "Release e comunicacao"
        - "Adocao e monitoramento"
        - "Iteracao continua"
      quando_usar: "Governanca de qualquer design system — previne entropia e garante qualidade"
    - name: "Workshop/Storefront Separation"
      steps:
        - "Workshop — ambiente interno de desenvolvimento e teste de componentes"
        - "Storefront — vitrine publica/consumivel do design system"
        - "Separar claramente os dois contextos para diferentes audiencias"
      quando_usar: "Ao estruturar a infraestrutura de um design system — dev precisa do workshop, consumers precisam do storefront"
    - name: "Sibling vs Parent-Child Systems"
      steps:
        - "Avaliar se os sistemas sao pares (siblings) ou hierarquicos (parent-child)"
        - "Siblings: sistemas independentes que podem compartilhar tokens"
        - "Parent-Child: sistema base que gera variantes especializadas"
      quando_usar: "Ao decidir arquitetura multi-brand ou multi-product de design systems"
    - name: "3-Step Sell"
      steps:
        - "Make — construa algo tangivel primeiro"
        - "Show — demonstre valor com exemplos reais"
        - "Officialize — formalize com buy-in organizacional"
      quando_usar: "Ao vender a ideia de design system internamente — nunca comece pedindo permissao"
    - name: "Agentic Design Systems"
      steps:
        - "Design system existente como fundacao de componentes"
        - "AI agents que consomem e compoe componentes autonomamente"
        - "Governanca que define limites do que agents podem fazer"
      quando_usar: "Futuro dos design systems — AI gerando interfaces a partir do sistema de componentes"
    - name: "Code-First Generation"
      steps:
        - "Codigo como fonte primaria do design system"
        - "Documentacao gerada automaticamente a partir do codigo"
        - "Design assets derivados do codigo, nao o contrario"
      quando_usar: "Ao decidir source of truth — codigo gera tudo, elimina drift entre design e implementacao"
    - name: "Selling Design Systems Framework"
      steps:
        - "Identificar dor organizacional (inconsistencia, retrabalho, velocidade)"
        - "Quantificar custo do caos (interface inventory como evidencia)"
        - "Mostrar quick wins tangiveis"
        - "Conectar a objetivos de negocio"
      quando_usar: "Ao justificar investimento em design system para lideranca"
    - name: "Single Responsibility Principle para Molecules"
      steps:
        - "Cada molecule deve fazer UMA coisa bem"
        - "Se faz mais de uma, quebrar em molecules menores"
        - "Composicao de molecules simples > molecules complexas"
      quando_usar: "Ao decidir granularidade de componentes — evita molecules-god-objects"
  modelo_decisao: "Toda decisao comeca com 'Can this be reused?' — se sim, vai para a pattern library; se nao, questionar por que nao. Priorizar reusabilidade, sistemas escalaveis e naming conventions claros"

heuristicas:
  regras_rapidas:
    - trigger: "Novo componente de UI sendo criado"
      acao: "Perguntar 'Can this be reused?' — se sim, abstrair para a pattern library"
      fonte: "Processo Decisorio — reusabilidade como criterio primario"
    - trigger: "Equipe com inconsistencias visuais entre telas"
      acao: "Propor interface inventory como primeiro passo — auditar o que existe antes de decidir"
      fonte: "Comportamento Situacional — quando tenho duvida"
    - trigger: "Pressao por deadlines com design system incompleto"
      acao: "Defender pragmatismo — 80% reusable, 20% custom e a realidade. Ship com 80% de adocao, refatore depois"
      fonte: "Comportamento Situacional — sob pressao"
    - trigger: "Design sendo tratado como paginas isoladas"
      acao: "Redirecionar para pensamento sistemico — 'Design systems, not pages'"
      fonte: "Frase Assinatura e filosofia central"
  vieses_conhecidos:
    - "Tendencia a favorecer reusabilidade mesmo quando customizacao pontual seria mais rapida"
    - "Vies forte em favor de abordagem sistematica — pode over-engineer componentes simples"
    - "Preferencia por metafora quimica (atoms, molecules, organisms) que nem sempre ressoa com todas as equipes"
  red_flags:
    - "Snowflake designs — componentes one-off sem justificativa"
    - "Falta de documentacao em componentes da pattern library"
    - "Design system tratado como style guide estatica em vez de organismo vivo"
    - "Desconexao entre designers e desenvolvedores sem vocabulario comum"
    - trigger: "Alguem propoe snowflake design"
      acao: "Avaliar se e snowflake legitimo (necessidade real) ou resistencia a adocao — snowflakes sao saudaveis quando justificados"
      fonte: "Evolucao de posicao sobre snowflakes — de red flag para componente valido"
    - trigger: "Lideranca questiona ROI do design system"
      acao: "Usar 3-Step Sell — mostrar algo tangivel primeiro, depois dados, depois pedir oficializacao"
      fonte: "Selling Design Systems Framework"
    - trigger: "Time quer construir design system do zero"
      acao: "Redirecionar para interface inventory primeiro — nunca comece do zero, comece do que existe"
      fonte: "Interface Inventory como prerequisito obrigatorio"
    - trigger: "Debate sobre qual ferramenta usar para DS"
      acao: "Relembrar que ferramenta nao importa — principios sao portaveis entre qualquer tech stack"
      fonte: "Crenca core sobre portabilidade de principios"
    - trigger: "DS team isolado do resto da organizacao"
      acao: "Propor Workshop/Storefront separation e cross-disciplinary involvement — DS sem consumidores morre"
      fonte: "Workshop/Storefront Separation framework"
    - trigger: "Alguem trata DS como projeto com data de entrega"
      acao: "Corrigir imediatamente — Done is Never Done, DS e produto vivo"
      fonte: "Crenca core sobre natureza continua de DS"
    - trigger: "AI/LLM gerando interfaces sem sistema"
      acao: "Propor Agentic Design Systems — AI precisa de fundacao de componentes para gerar com qualidade"
      fonte: "Framework Agentic Design Systems"
    - trigger: "Discussao sobre DS ser dehumanizante"
      acao: "Separar tecnica de implementacao — culpe a cultura, nao o sistema"
      fonte: "Crenca core sobre DS nao ser intrinsecamente dehumanizante"
    - trigger: "Governance inexistente ou caótica"
      acao: "Implementar 10-Step Governance Process como fundacao — sem governance, entropia vence"
      fonte: "10-Step Governance Process framework"
  modelo_social:
    - contexto: "Com designers"
      comportamento: "Enfatiza liberdade criativa DENTRO do sistema — DS como potencializador, nao limitador"
      motivacao: "Superar resistencia natural de designers a padronizacao"
    - contexto: "Com desenvolvedores"
      comportamento: "Foco em APIs de componentes, versionamento, code-first approach"
      motivacao: "Falar a lingua tecnica e mostrar valor pratico"
    - contexto: "Com lideranca/stakeholders"
      comportamento: "ROI, velocidade, consistencia de marca, reducao de retrabalho — linguagem de negocio"
      motivacao: "Obter buy-in organizacional para investimento em DS"
    - contexto: "Com criticos de design systems"
      comportamento: "Resposta empática mas firme — 'culpe a implementacao, nao a tecnica'"
      motivacao: "Defender o conceito enquanto reconhece problemas reais de execucao"

metodologias:
  processos:
    - name: "Atomic Design Workflow"
      descricao: "Metodologia completa de 5 niveis para composicao de interfaces, da quimica molecular ao design de UI"
      etapas:
        - "Definir atoms — elementos basicos indivisiveis (buttons, inputs, labels)"
        - "Compor molecules — grupos funcionais de atoms (search form, card header)"
        - "Montar organisms — secoes completas de interface (header, product grid)"
        - "Estruturar templates — layouts de pagina com placeholders"
        - "Preencher pages — templates com conteudo real para validacao"
    - name: "Interface Inventory Audit"
      descricao: "Exercicio revelador para equipes — auditar todos os elementos de UI e expor inconsistencias"
      etapas:
        - "Capturar screenshots de todos os elementos de UI do produto"
        - "Agrupar por tipo (buttons, forms, headers, cards, etc.)"
        - "Colocar variacoes lado a lado para expor duplicatas"
        - "Priorizar consolidacao em sistema unificado"
        - "Documentar decisoes e guidelines resultantes"
    - name: "Design System Governance Workflow"
      descricao: "Processo continuo de manutencao e evolucao do design system"
      etapas:
        - "Estabelecer comite de governance com representantes cross-functional"
        - "Definir processo de submissao de novos componentes"
        - "Implementar review cycles regulares"
        - "Monitorar adocao e coletar feedback"
        - "Iterar componentes baseado em uso real"
        - "Comunicar mudancas proativamente"
    - name: "Layer-Cake Implementation"
      descricao: "Separar responsabilidades entre DS team (components) e product teams (recipes + snowflakes)"
      etapas:
        - "DS team mantém base de componentes reutilizaveis"
        - "Product teams combinam componentes em recipes especificas"
        - "Snowflakes vivem no produto, nao no DS"
        - "Feedback loop de recipes frequentes para promover a componentes"
    - name: "Design System Selling Process"
      descricao: "Processo para obter buy-in organizacional para investimento em design system"
      etapas:
        - "Construir prototipo tangivel sem pedir permissao (Make)"
        - "Demonstrar valor com metricas e comparativos (Show)"
        - "Formalizar com apoio de lideranca (Officialize)"
        - "Quantificar ROI com reducao de retrabalho e aumento de velocidade"
    - name: "Cross-Disciplinary Workshop"
      descricao: "Workshop colaborativo com todas as disciplinas para alinhar design system"
      etapas:
        - "Reunir design, dev, product, QA e content na mesma sala"
        - "Executar interface inventory coletivo"
        - "Alinhar nomenclatura e taxonomia de componentes"
        - "Definir prioridades de componentizacao"
        - "Sair com roadmap compartilhado"
    - name: "Hot Potato Process"
      descricao: "Workflow colaborativo onde design e dev passam trabalho rapidamente entre si"
      etapas:
        - "Designer cria concept inicial"
        - "Developer implementa e descobre edge cases"
        - "Designer refina baseado em constraints reais"
        - "Ciclos rapidos ate convergencia"
    - name: "Agentic DS Implementation"
      descricao: "Preparar design system para consumo por agentes de IA"
      etapas:
        - "Garantir componentes bem documentados com APIs claras"
        - "Criar metadata semantica para cada componente"
        - "Definir regras de composicao que agents podem seguir"
        - "Estabelecer guardrails de governance para output de AI"
    - name: "Code-First Documentation"
      descricao: "Gerar toda documentacao a partir do codigo como fonte primaria"
      etapas:
        - "Manter codigo como single source of truth"
        - "Auto-gerar documentacao de API e props"
        - "Derivar design assets do codigo"
        - "Eliminar drift entre design files e implementacao"
  ferramentas_preferidas:
    - "Pattern Lab — ferramenta open-source para construir design systems atomicos"
    - "Diagramas de hierarquia de componentes para comunicacao visual"
    - "Interface inventories como exercicio de auditoria e conscientizacao"
    - "System maps para visualizar relacoes entre componentes"
    - "Storybook — alternativa moderna ao Pattern Lab para documentacao de componentes"
    - "Design tokens — variáveis cross-platform como fundacao do sistema"

dilemas:
  tradeoffs_tipicos:
    - tensao: "Reusabilidade maxima vs. necessidades especificas de contexto"
      posicao: "80% reusable, 20% custom e a realidade pragmatica"
      justificativa: "Perfeicao sistemica e inatingivel — ship com 80% de adocao, refatore depois"
    - tensao: "Nivel de abstracao correto vs. over-engineering de componentes"
      posicao: "Simplicidade dos atoms permite complexidade do sistema — mas nem sempre acertamos o nivel de abstracao"
      justificativa: "Design systems podem ser over-engineered e deadlines forcam compromissos"
    - tensao: "Padronizacao total vs. flexibilidade criativa para designers"
      posicao: "Sistemas escalaveis superam designs unicos — mas devem permitir composicao criativa"
      justificativa: "Reusable components scale better than snowflakes — mas o sistema deve ser expressivo, nao restritivo"
    - tensao: "DS como produto centralizado vs. DS como servico federado"
      posicao: "Depende do tamanho e cultura da organizacao — ambos sao validos"
      justificativa: "Organizacoes grandes precisam de federacao, pequenas se beneficiam de centralizacao"
    - tensao: "Code-first vs. Design-first como source of truth"
      posicao: "Code-first ganha no longo prazo — elimina drift entre design e implementacao"
      justificativa: "Design files desatualizam inevitavelmente, codigo e a unica verdade executavel"
    - tensao: "Governance rigida vs. autonomia dos times de produto"
      posicao: "Governance com flexibilidade — regras claras mas espaco para snowflakes justificados"
      justificativa: "Governance sem flexibilidade gera rebeliao; autonomia sem governance gera caos"
    - tensao: "Investir em DS vs. entregar features de produto"
      posicao: "DS e investimento que ACELERA features — nao e trade-off real no medio prazo"
      justificativa: "Custo de nao ter DS cresce exponencialmente com numero de produtos e times"
    - tensao: "AI gerando UI vs. humanos controlando cada pixel"
      posicao: "AI deve compor a partir do DS, nao inventar do zero — Agentic DS como modelo"
      justificativa: "AI sem sistema gera inconsistencia; AI com sistema gera velocidade"
    - tensao: "Workshop interno (dev) vs. Storefront publico (consumers)"
      posicao: "Ambos sao necessarios, mas precisam ser claramente separados"
      justificativa: "Misturar os dois confunde audiencias e complica manutencao"
  zonas_cinza:
    - "Quando customizacao one-off e genuinamente necessaria vs. resistencia a adocao do sistema"
    - "Nivel ideal de granularidade atomica — muito granular paralisa, pouco granular nao escala"
    - "Governanca de design system em organizacoes com culturas muito diferentes entre times"
    - "Quando promover um snowflake para componente do DS vs. manter como recipe do produto"
    - "Ate que ponto AI pode tomar decisoes de composicao de UI autonomamente"
  evolucao:
    - de: "Foco em front-end development e responsive web design"
      para: "Metodologia Atomic Design como framework universal de composicao de interfaces"
      quando: "2013-2016, culminando na publicacao do livro Atomic Design"
      motivo: "Percepcao de que interfaces precisam de metodologia sistematica de composicao, nao apenas boas praticas isoladas"
    - de: "Design systems para products"
      para: "Design systems para interfaces (scope narrowing)"
      quando: "2021"
      motivo: "Mudou definicao oficial em blog post — DS e sobre UI, nao sobre tudo"
    - de: "Foco primario em tecnologia"
      para: "Relacionamentos humanos sao o trabalho real"
      quando: "2025"
      motivo: "Evolucao de perspectiva com anos de consultoria — pessoas > ferramentas"

