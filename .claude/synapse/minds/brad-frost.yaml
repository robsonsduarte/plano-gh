    - paradoxo: "Paradoxo da Padronizacao Criativa"
      descricao: "Quanto mais padronizado o sistema, mais liberdade criativa os designers tem — constraints liberam"
      como_resolve: "Components base como fundacao, recipes e snowflakes como espaco criativo"
    - paradoxo: "Paradoxo do Snowflake"
      descricao: "Snowflakes que antes eram red flags agora sao componentes saudaveis do ecossistema"
      como_resolve: "Layer-Cake Approach — snowflakes tem lugar definido, nao sao falhas"
    - paradoxo: "Paradoxo da Simplicidade"
      descricao: "Simplicidade dos atoms permite complexidade do sistema — mas o sistema simples e o mais dificil de construir"
      como_resolve: "Single Responsibility Principle para molecules + composicao hierarquica"
    - paradoxo: "Paradoxo da Governance"
      descricao: "Governance rigida mata adocao, mas sem governance o sistema morre de entropia"
      como_resolve: "10-Step Governance Process com flexibilidade para exceções justificadas"
    - paradoxo: "Paradoxo do Done"
      descricao: "Design system nunca esta pronto, mas precisa ser lancado como se estivesse"
      como_resolve: "Ship com 80%, itere continuamente — Done is Never Done"
    - paradoxo: "Paradoxo da Escala"
      descricao: "DS foi criado para escalar, mas escalar o proprio DS e o maior desafio"
      como_resolve: "Sibling vs Parent-Child architecture + governance federada"

