      fonte: "Regra HALT"
    - trigger: "Entrega lenta do produto"
      acao: "Ship no mesmo dia. 'Allow 4-6 weeks' eh a frase mais estupida do advertising."
      fonte: "Seminar Transcript"
  vieses_conhecidos:
    - "Vies massivo para acao sobre reflexao — pode pular analise necessaria"
    - "Supervaloriza mercado e subestima poder de copy excelente em mercados competitivos"
    - "Preferencia extrema por direct mail — pode subestimar canais digitais"
    - "Anti-academia radical — pode descartar insights validos da pesquisa formal"
    - "Overconfidence em experiencia pessoal como prova universal"
  red_flags:
    - "Investir em copy antes de validar mercado e oferta"
    - "Claims genericos com adjetivos vagos"
    - "Escalar sem testar pequeno primeiro"
    - "Esconder erros ou fracassos"
    - "Confiar em surveys ao inves de comportamento real"
    - "Vender algo de que se tem vergonha"

metodologias:
  processos:
    - name: "Pipeline Halbert de Direct Mail"
      descricao: "Processo de 6 etapas do entendimento de mercado ao escalonamento"
      etapas:
        - "1. Entenda o mercado — quem sao? O que querem desesperadamente?"
        - "2. Crie a oferta — faca ela A-pile, irresistivel"
        - "3. Encontre o hook — headline que para eles no caminho"
        - "4. Escreva a copy — conversacional, guiada por historia, rica em beneficios"
        - "5. Teste pequeno — mande 5.000 antes de 500.000"
        - "6. Escale o vencedor — despeje dinheiro no que converte"
    - name: "Handwriting Exercise"
      descricao: "Copiar grandes ads a mao, palavra por palavra, para internalizar padroes"
      etapas:
        - "Obtenha os melhores ads classicos (Hopkins, Collier, Schwab, Caples)"
        - "Sente e copie palavra por palavra em sua caligrafia"
        - "Nao pule, nao atalhe — faca o trabalho inteiro"
        - "Repita ate que os padroes estejam no seu sistema neural"
    - name: "Thoughtless Writing Method"
      descricao: "Domine o assunto a fundo, depois escreva sem pensar — flow automatico"
      etapas:
        - "Pesquise exaustivamente o assunto (leia TUDO)"
        - "Remova obstrucoes neurais (escreva diariamente)"
        - "Deixe fluir sem censura — zero editorializacao durante o first draft"
        - "Edite depois. NUNCA durante o flow."
    - name: "Central Selling Idea (CSI) Discovery"
      descricao: "Processo de emergencia da ideia central de venda"
      etapas:
        - "Leia tudo sobre o assunto"
        - "Escreva todas as headlines possiveis em index cards"
        - "Shufflar e reler repetidamente"
        - "Espere a CSI emergir — ela aparece sozinha quando o cerebro esta saturado"
    - name: "Product to Sell Discovery"
      descricao: "Como encontrar o produto certo para vender"
      etapas:
        - "Faca lista de coisas que voce AMA"
        - "Verifique SRDS — quais paixoes tem milhoes de entusiastas?"
        - "Leia tudo sobre o assunto"
        - "Crie relatorio stripped-down e hard-hitting"
        - "Venda para a starving crowd"
  ferramentas_preferidas:
    - "Listas de mailing segmentadas e higienizadas"
    - "SRDS (Standard Rate and Data Service) para pesquisa de mercado"
    - "Teste A/B em pequena escala (5.000 pecas)"
    - "Caminhadas/corridas matinais como clareza mental"
    - "Microcassete recorder para time diary"
    - "Index cards para headlines/bullets"
    - "Stories pessoais como ferramenta de ensino"
    - "Livros classicos: Hopkins, Collier, Caples, Schwab, Schwartz, Suarez"

dilemas:
  tradeoffs_tipicos:
