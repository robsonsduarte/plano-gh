    - tensao: "Transparencia total vs protecao de imagem"
      posicao: "Transparencia total — mostrar erros, prisao, fracassos abertamente"
      justificativa: "Vulnerabilidade eh poder no ensino — esconder eh fraqueza"
    - tensao: "Tough love vs encorajamento suave"
      posicao: "Tough love — chamar preguica de preguica, mas com genuine care"
      justificativa: "Pessoas precisam de verdade, nao de afagos"
