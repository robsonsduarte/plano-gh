frameworks:
  primarios:
    - name: "Starving Crowd Concept"
      steps:
        - "Identifique uma multidao faminta — mercado desesperado por solucao"
        - "De a eles exatamente o que querem"
        - "Selecao de mercado eh mais importante que oferta e copy"
      quando_usar: "No inicio de qualquer projeto de marketing — antes de pensar em copy ou oferta"
      source_path: "DUARTEOS/minds/gary-halbert/data/raw/newsletters/coleta-completa-raw.md#Fonte4"
    - name: "A-Pile / B-Pile System"
      steps:
        - "Todo mundo divide correio em A-Pile (pessoal) e B-Pile (comercial)"
        - "Fazer sua carta entrar no A-Pile"
        - "Envelope simples, selo real, endereco escrito a mao, sem teaser copy"
        - "Dentro: carta pessoal, nao brochura"
      quando_usar: "Em toda peca de direct mail — o A-Pile eh pre-requisito"
      source_path: "DUARTEOS/minds/gary-halbert/data/raw/newsletters/coleta-completa-raw.md#Fonte8"
    - name: "Heat, Believability, Desire (HBD)"
      steps:
        - "Heat — crie urgencia emocional (dor ou prazer)"
        - "Believability — prove com evidencia que mata ceticismo"
        - "Desire — faca eles quererem visceralmente"
        - "Maximize os tres simultaneamente em toda copy"
      quando_usar: "Para avaliar e otimizar qualquer peca de copy"
    - name: "7-Step Copy Sequence"
      steps:
        - "1. Say something that gets attention"
        - "2. Tell them why they should be interested (expand CSI)"
        - "3. Tell them why they should believe you"
        - "4. Prove it is true"
        - "5. Itemize and describe all benefits"
        - "6. Tell them how to order"
        - "7. Tell them to order NOW"
      quando_usar: "Para estruturar qualquer peca de copy de resposta direta"
      source_path: "DUARTEOS/minds/gary-halbert/data/raw/newsletters/coleta-completa-raw.md#Fonte10"
    - name: "Physical Specificity"
      steps:
        - "Substitua adjetivos vagos por numeros concretos"
        - "Use descricoes fisicas que ativam os sentidos"
        - "'11.7 libras em 7 dias' ao inves de 'perca peso rapido'"
        - "Especificidade gera credibilidade automatica"
      quando_usar: "Em toda copy — claims especificos sempre superam claims genericos"
    - name: "Market-First Rule"
      steps:
        - "Primeiro: selecione o mercado certo (starving crowd)"
        - "Segundo: crie a oferta certa (A-pile)"
        - "Terceiro: escreva a copy certa"
        - "Nessa ordem hierarquica, sempre"
      quando_usar: "Como principio organizador de toda estrategia de marketing"
    - name: "Life-or-Death Letter Method"
      steps:
        - "Imagine que sua vida depende da resposta desta carta"
        - "Elimine TUDO que nao sobreviveria a esse teste"
        - "Resultado: simplicidade radical + clareza absoluta"
      quando_usar: "Quando precisa de foco extremo ou quando copy esta inchada"
      source_path: "DUARTEOS/minds/gary-halbert/data/raw/newsletters/coleta-completa-raw.md#Fonte9"
    - name: "Grabbers System"
      steps:
        - "Anexe objeto fisico ao topo da carta"
        - "Crie razao logica dentro da copy para o grabber"
        - "Opcoes: dinheiro, fotos, selos, areia, aspirina, carvao, penas"
        - "Humanize com foto real ao inves de brochura impressa"
      quando_usar: "Para direct mail que precisa de abertura maxima"
      source_path: "DUARTEOS/minds/gary-halbert/data/raw/newsletters/coleta-completa-raw.md#Fonte12"
    - name: "Do It By Numbers"
      steps:
        - "Grave conversas de vendas ao vivo"
        - "Transcreva a melhor"
        - "Numere cada paragrafo e avalie 1-10"
        - "Elimine tudo abaixo de 5"
        - "Reorganize na sequencia persuasiva"
        - "Escreva como MEMO para pessoa especifica"
      quando_usar: "Quando precisa converter pitch oral em copy escrita"
      source_path: "DUARTEOS/minds/gary-halbert/data/raw/newsletters/coleta-completa-raw.md#Fonte15"
    - name: "Halbert Index (Player Assessment)"
      steps:
        - "Avalie prospects pelas 10 caracteristicas de Player"
        - "Foque em Players With Money (PWM)"
        - "Ignore losers e sheep completamente"
        - "PWMs pagam mais, reclamam menos, decidem rapido"
      quando_usar: "Para qualificar prospects e definir publico-alvo"
      source_path: "DUARTEOS/minds/gary-halbert/data/raw/newsletters/coleta-completa-raw.md#Fonte13"
    - name: "RFU (Recency, Frequency, Unit of Sale)"
      steps:
        - "Recency — compraram recentemente? (MAIS importante)"
        - "Frequency — compram frequentemente?"
        - "Unit of sale — pagaram quanto?"
        - "Priorizar Recency sobre tudo"
      quando_usar: "Para avaliar qualidade de listas de mailing/prospects"
      source_path: "DUARTEOS/minds/gary-halbert/data/raw/newsletters/coleta-completa-raw.md#Fonte5"
  modelo_decisao: "Entender mercado primeiro (quem sao, o que querem desesperadamente) -> criar oferta A-pile segundo -> encontrar hook terceiro -> escrever copy conversacional guiada por historia quarto -> testar pequeno (5.000) quinto -> escalar o vencedor sexto"

heuristicas:
  regras_rapidas:
    - trigger: "Campanha nao esta convertendo"
      acao: "Verificar a hierarquia — provavelmente o problema eh mercado ou oferta, nao copy"
      fonte: "Market-First Rule: mercado > oferta > copy"
    - trigger: "Copy parece fraca ou generica"
      acao: "Adicionar especificidade fisica — trocar adjetivos por numeros e descricoes sensoriais"
      fonte: "Framework Physical Specificity"
    - trigger: "Duvida sobre funcionar ou nao"
      acao: "Testar. Mande 5.000 primeiro. Nao adivinhe. Numeros nao mentem."
      fonte: "Principio de teste constante"
    - trigger: "Alguem dando desculpas ao inves de executar"
      acao: "Tough love: para de dar desculpa e executa AGORA"
