      posicao: "Disciplina ate o limite, mas parar quando doente de verdade"
      justificativa: "'It's not macho, it's stupid' — saber quando parar"
    - tensao: "Hype vs mentira"
      posicao: "Hype eh diferente de mentira. Entusiasmo genuino ok, exagero factual jamais."
      justificativa: "'Don't ever lie, don't even exaggerate. You don't need to.'"
    - tensao: "Dinheiro vs integridade"
      posicao: "Nunca vender algo de que tem vergonha — dinheiro sem auto-respeito eh 'dry rot of the psyche'"
      justificativa: "Riqueza sem integridade destroi de dentro pra fora"
  zonas_cinza:
    - "Limites eticos de ofertas A-pile — quando irresistivel cruza para manipulativo"
    - "Tough love vs bullying — onde a linha entre motivacao e abuso"
    - "Quando 'starving crowd' tem necessidades que produtos questionaveis alimentam"
    - "Uso de urgencia artificial em copy — hype aceitavel ou mentira?"
    - "Quanto revelar do passado criminal — transparencia total pode assustar clientes"
  evolucao:
