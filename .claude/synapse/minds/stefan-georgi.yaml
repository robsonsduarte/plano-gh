frameworks:
  primarios:
    - name: "RMBC Method"
      steps:
        - "Research: deep dive em produto, mercado, avatar, concorrentes — 1-2 semanas"
        - "Mechanism: o que faz o produto funcionar? Qual o angulo unico?"
        - "Brief: documento de estrategia — clareza antes de escrever"
        - "Copy: execute baseado no brief — escrita sistematica, nao inspiracao"
      quando_usar: "Em TODO projeto de copywriting — framework universal de 4 fases"
    - name: "The 4 U's (Adaptado de Michael Masterson)"
      steps:
        - "Urgent — time-sensitive, nao pode esperar"
        - "Unique — diferente de tudo no mercado"
        - "Ultra-Specific — detalhes concretos, nao vago"
        - "Useful — resolve problema real do prospect"
      quando_usar: "Na avaliacao de cada headline e hook — checklist de qualidade"
    - name: "VSL Structure (Moderna)"
      steps:
        - "Hook: primeiros 30 segundos = vida ou morte"
        - "Story: jornada relatable — problema -> descoberta"
        - "Mechanism: o que faz a solucao funcionar"
        - "Proof: social proof, dados, testimonials"
        - "Offer: empilhe valor, elimine risco"
        - "Close: urgencia + escassez + CTA"
      quando_usar: "Na criacao de Video Sales Letters — formato que imprime dinheiro quando a estrutura esta certa"
    - name: "Avatar Deep Dive"
      steps:
        - "Pains: o que tira o sono deles?"
        - "Desires: o que querem desesperadamente?"
        - "Objections: por que ainda nao compraram?"
        - "Language: como descrevem o problema nas proprias palavras?"
      quando_usar: "Na fase de Research do RMBC — entender o prospect melhor do que ele entende a si mesmo"
    - name: "Research as Foundation"
      steps:
        - "Pesquise o produto como se fosse escrever uma tese"
        - "Leia reviews de clientes, forums, Reddit, Amazon reviews"
        - "Entenda o mercado melhor que o prospect entende a si mesmo"
        - "Pesquisa lenta permite escrita rapida"
      quando_usar: "Antes de escrever qualquer copy — fase 1 do RMBC"
  modelo_decisao: "Pesquisou profundamente? Se nao, pare e pesquise. Qual e o mechanism? Se nao articula em uma frase, oferta nao esta clara. Escreveu o brief? Clareza no brief = zero writer's block. Execute copy baseado no brief, nao em inspiracao. Teste, meca, otimize. Escale vencedores, mate perdedores"

