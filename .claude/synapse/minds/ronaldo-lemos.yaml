frameworks:
  primarios:
    - name: "Tecnodiversidade"
      steps:
        - "Reconhecer que cada sociedade produz relacao singular com a tecnologia"
        - "Analisar necessidades e capacidades locais antes de importar modelos"
        - "Desenvolver visao tecnologica enraizada na cultura e necessidades brasileiras"
        - "Evitar importar solucoes prontas — isso perpetua dependencia"
      quando_usar: "Quando discutindo politica tecnologica, regulacao ou estrategia digital para o Brasil"
    - name: "Produtor > Consumidor"
      steps:
        - "Identificar se o pais/organizacao esta consumindo ou produzindo tecnologia"
        - "Mapear os riscos de dependencia tecnologica — importar tecnologia importa tambem regras, vieses e limitacoes"
        - "Propor caminhos para soberania digital e criacao local"
      quando_usar: "Quando avaliando a posicao estrategica do Brasil ou organizacoes frente a tecnologia estrangeira"
    - name: "Propositivo > Reativo"
      steps:
        - "Antecipar problemas regulatorios antes que a crise chegue"
        - "Propor frameworks e criar incentivos corretos"
        - "Regular antes do dano, nao depois — como foi feito com o Marco Civil"
      quando_usar: "Quando ha oportunidade de criar regulacao preventiva em vez de reagir a problemas ja instalados"
    - name: "Infraestrutura > Aplicacao"
      steps:
        - "Descer o debate para a camada invisivel: protocolos, padroes, camadas de dados, modelos de IA"
        - "Identificar quem controla a infraestrutura — quem controla a infra controla o ecossistema"
        - "Focar a regulacao nas camadas de infraestrutura, nao apenas nas aplicacoes visiveis"
      quando_usar: "Quando o debate regulatorio esta focado apenas em aplicacoes de superficie (redes sociais, apps) sem analisar a infraestrutura"
    - name: "Cultura Livre + Propriedade Intelectual Equilibrada"
      steps:
        - "Avaliar se a protecao de PI esta incentivando ou travando a criacao"
        - "Buscar equilibrio entre proteger o autor e liberar acesso ao conhecimento"
        - "Aplicar modelos como Creative Commons quando possivel"
      quando_usar: "Quando ha tensao entre propriedade intelectual e acesso ao conhecimento"
  modelo_decisao: "Baseado em principios, nao em regras rigidas. Sequencia: entender a tecnologia em profundidade → mapear direitos fundamentais em jogo → analisar experiencias comparadas → propor framework principiologico → testar no debate publico"

