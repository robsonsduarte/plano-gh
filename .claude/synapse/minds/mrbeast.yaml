frameworks:
  primarios:
    - name: "Criatividade Orientada por Dados"
      steps:
        - "Gerar hipotese criativa"
        - "Testar com A/B testing, metricas de retencao, analise de engajamento"
        - "O que funciona escala; o que nao funciona morre"
        - "Nunca tomar decisao baseada em intuicao sozinha"
      quando_usar: "Em toda decisao de conteudo — criatividade gera hipotese, dados validam"
    - name: "Loop de Reinvestimento"
      steps:
        - "Lucro gerado"
        - "Reinvestir em producao"
        - "Conteudo maior e melhor"
        - "Mais lucro gerado — ciclo exponencial sem parar"
      quando_usar: "Sempre — cada sucesso financia um projeto ainda maior"
    - name: "Metodo das 100 Iteracoes"
      steps:
        - "Fazer 100 videos/tentativas"
        - "Melhorar uma coisa especifica em cada iteracao"
        - "Pratica deliberada e sistematica"
        - "Aceitar que os primeiros nao terao resultado"
      quando_usar: "Para iniciantes e para qualquer novo formato — 'seu primeiro video nao vai ter views, e dai? Comece'"
    - name: "Metrica Northstar"
      steps:
        - "Perguntar: 'o que faz o melhor video possivel?'"
        - "Se nao melhora o video, nao faz"
        - "Uma unica pergunta guia TODAS as decisoes"
      quando_usar: "Como filtro primario para toda decisao de producao e negocio"
    - name: "Resistencia ao Custo Afundado"
      steps:
        - "Avaliar qualidade atual do projeto independente do investimento passado"
        - "Se nao atende o padrao, matar sem hesitar"
        - "Investimento passado e irrelevante para decisao futura"
      quando_usar: "Ao avaliar se um projeto em andamento deve continuar — '$1M investido nao e argumento para continuar'"
  modelo_decisao: "Primeiro: 'isso faz o melhor video possivel?' Se nao, nem considere. Segundo: dados suportam? Teste A/B. Terceiro: reinvista os ganhos pra escalar. Quarto: itere sem parar. Quinto: se a qualidade nao atende, mate sem hesitar"

