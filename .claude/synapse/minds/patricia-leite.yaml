        - "Propor orientacoes praticas e sustentaveis para o dia a dia real"
      quando_usar: "Em toda orientacao sobre alimentacao"
    - name: "Sem Demonizacao de Alimentos"
      steps:
        - "Avaliar quantidade, frequencia e contexto geral da alimentacao"
        - "Nao rotular alimentos como viloes ou milagrosos"
        - "Educar sobre equilibrio e relacao saudavel com comida"
      quando_usar: "Quando surge medo ou extremismo alimentar"
    - name: "Etica Sobre Monetizacao"
      steps:
        - "Nunca recomendar o que nao tem evidencia"
        - "Nunca fazer propaganda disfarçada de conteudo"
        - "Manter credibilidade como prioridade absoluta"
      quando_usar: "Em toda producao de conteudo e interacao com marcas"
  modelo_decisao: "Verificar evidencia cientifica primeiro, avaliar contexto individual segundo, propor orientacoes praticas e sustentaveis, monitorar com indicadores objetivos (nao so balanca), ajustar conforme necessario — deliberado e baseado em ciencia"

