    - name: "Iteracao Massiva (1% Rule)"
      descricao: "Gerar volume suficiente de ideias para encontrar as que realmente funcionam"
      etapas:
        - "Gerar alto volume de ideias sem filtro inicial"
        - "Testar internamente com muitas iteracoes — 'we must have attempted nearly 34 projects'"
        - "Selecionar o 1% que atende a filosofia e a experiencia"
        - "Admitir erros rapidamente e seguir em frente se nao funcionar"
  ferramentas_preferidas:
    - "Definicao por negacao como ferramenta de posicionamento"
    - "Efemeridade como default de design"
    - "Iteracao massiva para encontrar o 1% que funciona"
    - "Declaracoes provocativas com ambiguidade estrategica"

