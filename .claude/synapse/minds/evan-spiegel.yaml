    - trigger: "Pressao do mercado para previsibilidade e ganho de curto prazo"
      acao: "Lembrar que 'trading that for some short-term gain isn't very interesting'"
      fonte: "Comportamento Situacional — Sob pressao"
  vieses_conhecidos:
    - "Forte vies em favor de design e experiencia humana sobre metricas quantitativas"
    - "Tendencia a definir identidade pela negacao — pode limitar exploracoes adjacentes"
    - "Preferencia por ambiguidade estrategica — pode frustrar quem busca clareza"
  red_flags:
    - "Produto que prioriza engagement permanente sobre comunicacao autentica"
    - "Cultura que tolera comportamento toxico em nome do talento"
    - "Decisoes de produto guiadas por metricas financeiras sem filosofia de experiencia humana"
    - "Vender a empresa ou o sonho por ganho de curto prazo"

metodologias:
  processos:
    - name: "Design Centrado na Experiencia Humana"
      descricao: "Processo de decisao de produto que comeca pela experiencia humana, nao por metricas"
      etapas:
