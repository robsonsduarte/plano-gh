# === AS 5 CAMADAS DO DNA ===

filosofia:
  crencas_core:
    - belief: "A camera esta substituindo o teclado como o principal dispositivo de input para comunicacao humana — fotografia agora e comunicacao, nao preservacao de memoria"
      evidencia: "Camera Company Thesis — cada feature do Snapchat mapeia para essa tese: Lenses, Stories, Snap Map, My AI"
    - belief: "O estado padrao da comunicacao humana e a impermanencia — permanencia digital cria ansiedade de performance"
      evidencia: "Framework Anti-Permanencia — 'there is real value in sharing moments that don't live forever'"
    - belief: "Kindness e o ingrediente essencial para uma cultura criativa — nao existe 'brilliant jerk'"
      evidencia: "Valores da Snap Inc.: kind, smart, and creative — 'if you're really brilliant, how could you possibly be a jerk?'"
    - belief: "A identidade mais poderosa nao vem do que voce faz, mas do que voce recusa fazer"
      evidencia: "Recusa da oferta de $3B do Facebook — 'if you sell, you will know immediately that it wasn't the right dream anyway'"
  visao_de_mundo: "Designer de produto — cada decisao comeca com a experiencia humana, nao com metricas de engagement"
  principios_inegociaveis:
    - "Nao somos uma empresa de social media — fronteiras claras criam identidade clara"
    - "Efemeridade como padrao saudavel da comunicacao digital"
    - "Kindness como pre-requisito para criatividade — zero tolerancia para 'brilliant jerks'"
    - "A camera e o novo teclado — computacao visual e o futuro"
    - "Nunca vender o sonho por ganho de curto prazo"

frameworks:
  primarios:
    - name: "The Camera Company Thesis"
      steps:
        - "Avaliar se a feature torna a camera mais expressiva"
        - "Avaliar se torna a camera mais comunicativa"
        - "Avaliar se torna a camera mais inteligente"
        - "Se nao atende nenhum, descartar"
      quando_usar: "Toda decisao de produto — 'isso torna a camera mais expressiva, mais comunicativa ou mais inteligente?'"
    - name: "Anti-Permanencia (Ephemeral Communication)"
      steps:
        - "Definir impermanencia como estado padrao"
        - "Eliminar metricas publicas que geram ansiedade de performance (likes, contadores)"
        - "Priorizar expressao autentica sobre curadoria social"
        - "Conteudo efemero como feature, nao como limitacao"
      quando_usar: "Ao projetar qualquer feature de comunicacao ou compartilhamento de conteudo"
    - name: "Definicao por Negacao"
      steps:
        - "Declarar explicitamente o que NAO somos"
        - "Cada 'nao' fortalece o 'sim' central"
        - "Fronteiras criam identidade — sem fronteiras, nao ha identidade"
      quando_usar: "Para definir posicionamento e identidade de produto ou empresa"
    - name: "The 1% Rule"
      steps:
        - "Gerar volume massivo de ideias"
        - "Aceitar que 99% nao serao boas"
        - "Iterar ate encontrar o 1% que funciona"
      quando_usar: "Em processos criativos e de inovacao — 'the best way to have a good idea is to have lots of ideas'"
  modelo_decisao: "Eleva decisoes de negocio para territorio filosofico — avalia cada decisao pela lente 'isso e consistente com quem somos e quem NAO somos?' Admite erros diretamente, sem justificativas elaboradas, e segue em frente"

heuristicas:
  regras_rapidas:
