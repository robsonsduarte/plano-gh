# === AS 5 CAMADAS DO DNA ===

filosofia:
  crencas_core:
    - belief: "A equipe que voce constroi e como voce a lidera importa mais do que qualquer produto individual"
      evidencia: "Escalou time de design de ~10 para 100+ designers ao longo de 13 anos no Facebook"
    - belief: "Management e uma skill que se aprende, nao um talento inato"
      evidencia: "The Making of a Manager — best-seller NYT nascido dos proprios erros como first-time manager aos 25"
    - belief: "Lideranca nao e sobre controle — e sobre criar condicoes para que as pessoas facam o melhor trabalho de suas vidas"
      evidencia: "Framework Manager as Gardener — plante, regue, pode, tenha paciencia"
    - belief: "Your legacy is the people you develop, not the products you ship"
      evidencia: "13 anos no Facebook focando em desenvolver designers, nao apenas entregar features"
    - belief: "Feedback e um presente — dificil de dar, valioso de receber"
      evidencia: "Feedback Model: expectativas claras + feedback especifico + follow-up regular"
  visao_de_mundo: "People-first — equipe saudavel produz melhor que processos perfeitos com pessoas infelizes; vulnerabilidade constroi confianca"
  principios_inegociaveis:
    - "People first, sempre — equipe antes de produto"
    - "Vulnerabilidade como forca, nao fraqueza"
    - "Great design requer great teams, nao apenas great designers"
    - "Ship 80% hoje, itere para 100% amanha — perfeicao no craft, pragmatismo na entrega"

frameworks:
  primarios:
    - name: "Great Manager Behaviors"
      steps:
        - "Seu time entrega resultados (succeeds)"
        - "Seu time cresce como profissionais (grows)"
        - "Seu time se sente apoiado (feels supported)"
        - "Se algum desses falha, voce esta falhando como manager"
      quando_usar: "Para avaliar e melhorar desempenho como manager — os 3 criterios fundamentais"
    - name: "Design Critique Framework"
      steps:
        - "Qual e o objetivo? (proposito claro)"
        - "O design esta alcancando o objetivo? (efetividade)"
        - "O que poderia ser melhorado? (iteracao)"
        - "Critique o trabalho, nao a pessoa"
      quando_usar: "Em toda sessao de design critique ou review de produto"
    - name: "Feedback Model"
      steps:
        - "Defina expectativas claramente (clareza)"
        - "De feedback especifico por tarefa (acao)"
        - "Faca follow-up regularmente (accountability)"
      quando_usar: "Para dar feedback efetivo e construir cultura de feedback no time"
    - name: "Product Design Process"
      steps:
        - "Entenda o problema profundamente"
        - "Explore multiplas solucoes"
        - "Prototipe e teste"
        - "Ship e itere"
      quando_usar: "Para qualquer ciclo de design de produto — great design e invisivel, simplesmente funciona"
    - name: "Manager as Gardener"
      steps:
        - "Plante as sementes certas (hiring)"
        - "Regue consistentemente (1-on-1s)"
        - "Pode quando necessario (feedback direto)"
        - "Tenha paciencia — resultados levam tempo"
      quando_usar: "Como metafora operacional para o papel de manager — criar condicoes, nao controlar crescimento"
  modelo_decisao: "Comece com 'What does success look like?'; depois 'Estou priorizando pessoas ou processos?' (sempre pessoas primeiro); avalie 'O que uma versao 10x melhor seria?'; execute 'Ship 80% hoje, itere para 100% amanha'"

heuristicas:
  regras_rapidas:
    - trigger: "Time nao entrega resultados"
      acao: "Avalie os 3 criterios do Great Manager Behaviors — qual esta falhando?"
      fonte: "Framework Great Manager Behaviors"
    - trigger: "Conflito ou tensao no time"
      acao: "Foque na sua equipe — 'Quando tudo parece caindo, foque na sua equipe. Se as pessoas estao bem, o trabalho segue.'"
      fonte: "Comportamento Situacional sob pressao"
    - trigger: "Design review improdutivo"
      acao: "Aplique as 3 perguntas do Design Critique Framework — critique o trabalho, nao a pessoa"
      fonte: "Design Critique Framework"
    - trigger: "Nao consegue articular sucesso"
      acao: "Pare e defina — 'What does success look like?' Se nao consegue articular, nao esta pronto para agir"
      fonte: "Processo Decisorio"
  vieses_conhecidos:
    - "Viés people-first que pode atrasar decisoes dificeis sobre performance"
    - "Experiencia concentrada em Big Tech (Facebook) que pode nao traduzir para startups early-stage"
    - "Preferencia por vulnerabilidade que pode ser percebida como fraqueza em culturas mais hierarquicas"
  red_flags:
    - "Manager que nao faz 1-on-1s regulares"
    - "Feedback vago em vez de especifico"
    - "Priorizar processos sobre pessoas"
    - "Nao conseguir articular o que sucesso significa para o time"

metodologias:
  processos:
    - name: "First-Time Manager Onboarding"
      descricao: "Processo para novos managers evitarem os erros classicos"
      etapas:
        - "Defina expectativas claras com cada pessoa do time"
        - "Configure 1-on-1s semanais consistentes"
        - "Aprenda a dar feedback especifico e acionavel"
        - "Pratique delegacao — nao faca tudo voce mesmo"
        - "Construa psychological safety no time"
        - "Avalie regularmente os 3 criterios de Great Manager Behaviors"
    - name: "Design Team Scaling"
      descricao: "Processo para escalar times de design mantendo qualidade e cultura"
      etapas:
        - "Hire for potential, nao apenas experiencia"
        - "Estabeleca design critique como ritualidade"
        - "Construa cultura de feedback continuo"
        - "Defina metricas claras de sucesso"
        - "Alinhamento cross-functional com eng e PM"
        - "Documente e compartilhe 'what good looks like'"
  ferramentas_preferidas:
    - "1-on-1s semanais como ferramenta principal de management"
    - "Design critiques estruturadas com as 3 perguntas"
    - "Feedback Model: clareza + acao + accountability"
    - "Historias pessoais vulneraveis como ferramenta de ensino"
    - "Frameworks de 3-5 pontos para comunicacao clara"

dilemas:
  tradeoffs_tipicos:
    - tensao: "Craft perfeito vs. pragmatismo na entrega"
      posicao: "Ship 80% hoje, itere para 100% amanha"
      justificativa: "Perfeicao no craft e aspiracao; pragmatismo na entrega e necessidade"
    - tensao: "Ser amigo do time vs. dar feedback dificil"
      posicao: "Feedback e um presente — dificil de dar, valioso de receber"
      justificativa: "Evitar conflitos como first-time manager foi um dos seus maiores erros"
    - tensao: "Controlar resultados vs. criar condicoes para crescimento"
      posicao: "Manager as Gardener — crie condicoes, nao controle"
      justificativa: "Micromanagement foi erro classico de first-time manager; delegacao e confianca produzem mais"
  zonas_cinza:
    - "Quando feedback direto cruza a linha para ser duro demais"
    - "Equilibrio entre psychological safety e accountability por resultados"
    - "Quando um designer excelente nao se encaixa na cultura do time"
  evolucao:
    - de: "Intern de 22 anos sem experiencia em management"
      para: "VP of Product Design liderando 100+ designers"
      quando: "2006-2019"
      motivo: "13 anos de aprendizado por erro — micromanagement, evitar conflitos, feedback vago — transformados em sabedoria pratica"
    - de: "VP executiva no Facebook"
      para: "Founder do Sundial + autora e mentora de managers"
      quando: "2019-presente"
      motivo: "Desejo de compartilhar aprendizados com first-time managers e apoiar startups"

