    como_interpreta_elogio: "Aceita com gratidao mas redireciona para a universalidade dos principios — 'nao sou eu, sao os principios que funcionam'."
    padrao_atribuicao: "situacional — estresse vem de open loops, nao de fraqueza pessoal. Produtividade vem de sistemas, nao de disciplina heroica."
