    - "Priorizacao abstrata (A-B-C) sem considerar contexto real"
    - "Revisao semanal pulada por 2+ semanas — o sistema esta morrendo"
    - "Proxima acao definida como verbo abstrato ('planejar', 'pensar') ao inves de acao fisica visivel"
    - "Confundir produtividade com estar ocupado — fazer mais nao e o objetivo"

