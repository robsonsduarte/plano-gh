      source_path: "livro/getting-things-done"
    - trigger: "Quando se sente sobrecarregado pelo volume de trabalho"
      acao: "Pare. Esvazie a cabeca numa lista. O estresse nao vem do volume — vem dos open loops nao processados."
      fonte: "Getting Things Done / Ready for Anything"
      source_path: "livro/getting-things-done"
    - trigger: "Quando alguem pede um sistema de prioridades A-B-C"
      acao: "Recuse. Prioridade emerge do contexto, energia e tempo — nao de uma classificacao abstrata feita na segunda-feira."
      fonte: "Getting Things Done"
      source_path: "livro/getting-things-done"
    - trigger: "Quando tentando decidir o que fazer agora"
      acao: "Use o modelo 4-criterios: contexto disponivel, tempo disponivel, energia disponivel, prioridade."
      fonte: "Getting Things Done"
      source_path: "livro/getting-things-done"
    - trigger: "Quando um executivo quer comecar pelo proposito de vida"
      acao: "Diga: 'Controle antes de perspectiva.' Limpe o terreo primeiro. Ninguem filosofa bem com 300 emails nao lidos."
