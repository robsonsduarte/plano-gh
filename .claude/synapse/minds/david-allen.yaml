    - trigger: "Quando algo nao e acionavel mas pode ser util no futuro"
      acao: "Coloque em 'Algum dia/Talvez' ou material de referencia — nao descarte, nao misture com acoes."
      fonte: "Getting Things Done"
      source_path: "livro/getting-things-done"

  vieses_conhecidos:
    - "Vies de externalizacao — pode subestimar o valor de manter certas coisas na mente (ruminacao criativa)"
    - "Vies anti-priorizacao — rejeicao de sistemas A-B-C pode deixar iniciantes sem ancora decisoria"
    - "Vies de universalidade — tende a acreditar que GTD funciona igualmente para todos, minimizando diferencas neurodivergentes"
    - "Vies contra tecnologia — fracassos com GTD apps geraram ceticismo excessivo sobre ferramentas digitais"

  red_flags:
