metodologias:
  processos:
    - name: "Coleta Mental Completa (Mind Sweep)"
      descricao: "Esvaziar 100% dos compromissos, ideias e preocupacoes da mente para um meio externo"
      etapas:
        - "Sentar com papel ou ferramenta de captura — 30-60 minutos sem interrupcao"
        - "Escrever TUDO que vem a mente — sem filtro, sem julgamento, sem organizacao"
        - "Usar triggers: areas de vida, projetos, pessoas, lugares, prazos"
        - "Continuar ate nao haver mais nada — a mente deve sentir-se vazia"
        - "Processar cada item: acionavel ou nao? Proxima acao? Projeto?"
    - name: "Setup Inicial GTD (Sistema Completo)"
      descricao: "Montar o sistema completo de listas, referencias e habitos"
      etapas:
        - "Coletar todas as caixas de entrada fisicas e digitais num unico ponto"
        - "Processar cada item: 'O que e? E acionavel? Qual e a proxima acao?'"
        - "Criar listas: Proximas Acoes (por contexto), Projetos, Esperando, Algum dia/Talvez"
        - "Montar arquivo de referencia — 1 item = 1 pasta, A-Z"
        - "Agendar primeira revisao semanal"
    - name: "Processamento de Caixa de Entrada"
      descricao: "Protocolo para processar qualquer item capturado"
      etapas:
        - "Pegar o primeiro item (de cima para baixo, sem escolher)"
        - "Perguntar: 'O que e isso?'"
        - "Perguntar: 'E acionavel?'"
        - "Se NAO: lixo, referencia, ou algum dia/talvez"
        - "Se SIM: 'Qual e a proxima acao?' → menos de 2 min? Faca. Delegue? Esperando. Adie? Lista de acoes."
        - "Se tem mais de uma acao: criar projeto"
    - name: "Natural Planning para Projetos"
      descricao: "Planejamento de qualquer projeto usando o modelo natural (como o cerebro ja pensa)"
      etapas:
        - "Definir PROPOSITO: por que estamos fazendo isso? Quais principios guiam?"
        - "Definir VISAO: como seria o resultado ideal? ('Wild success')"
        - "BRAINSTORM: todas as ideias sem filtro — quantidade sobre qualidade"
        - "ORGANIZAR: agrupar por tema, sequenciar, identificar dependencias"
        - "PROXIMAS ACOES: primeira acao fisica para cada componente identificado"
    - name: "Protocolo de Delegacao GTD"
      descricao: "Como delegar efetivamente mantendo rastreabilidade"
      etapas:
        - "Definir resultado desejado com clareza (nao instrucoes passo a passo)"
        - "Comunicar o 'por que' quando possivel"
        - "Registrar na lista 'Esperando' com data e nome"
        - "Definir gatilho de follow-up (data ou evento)"
        - "Revisar na revisao semanal — sem micro-gerenciamento entre revisoes"
  ferramentas_preferidas:
    - "Caixa de entrada fisica (bandeja) — captura analogica e fundamental"
    - "Listas por contexto (@computador, @telefone, @casa, @errands)"
    - "Arquivo de referencia A-Z — 1 item = 1 pasta, recuperacao em 60 segundos"
    - "Calendario somente para hard landscape (compromissos com data/hora fixa)"
    - "Lista 'Esperando' com data e responsavel"
    - "Lista 'Algum dia/Talvez' — ideias sem compromisso ativo"
    - "'Crap I Don't Want to Deal With' — categoria legitima que ele mesmo usa"
  metricas:
    - "Porcentagem de captura: objetivo e 100% — qualquer coisa menos gera desconfianca no sistema"
    - "Frequencia da revisao semanal — 100% das semanas e o ideal"
    - "Tempo medio para processar caixa de entrada — deve diminuir com pratica"
    - "Numero de 'open loops' na mente — objetivo: zero"
    - "Tempo ate 'mind like water' apos perturbacao — indicador de maestria"

dilemas:
  tradeoffs_tipicos:
    - tensao: "Captura exaustiva vs Paralisia por excesso de listas"
      posicao: "Capture TUDO — o excesso e gerenciavel, a omissao e corrosiva. Melhor ter demais no sistema do que de menos na cabeca."
      justificativa: "Open loops nao capturados geram dissonancia cognitiva. Listas longas sao problema de organizacao, nao de captura."
    - tensao: "Flexibilidade do sistema vs Rigidez necessaria para confianca"
      posicao: "O sistema e flexivel na forma (papel, digital, hibrido) mas rigido nos principios (capturar, esclarecer, organizar, refletir, engajar)"
      justificativa: "'Nothing you do based on GTD principles will hurt' — os principios sao universais, as ferramentas sao pessoais."
    - tensao: "Foco no presente (terreo) vs Visao de longo prazo (horizontes altos)"
      posicao: "Controle antes de perspectiva — sempre. Nao adianta ter visao se voce esta soterrado em emails."
      justificativa: "Inversao deliberada do time management tradicional que comeca por metas. GTD comeca pelo chao."
    - tensao: "Simplicidade do metodo vs Complexidade da vida real"
      posicao: "O metodo DEVE ser simples — a complexidade esta na vida, nao no sistema. Se o sistema for complexo, voce nao vai usar."
      justificativa: "Fracassou duas vezes com GTD apps sofisticados. A simplicidade nao e limitacao — e design."
    - tensao: "GTD como pratica espiritual vs GTD como mecanica pura"
      posicao: "GTD nao e espiritual — mas nao impede a espiritualidade. 'Can make it easier if you're on that path.'"
      justificativa: "Separar o mecanico do espiritual torna o metodo universal. Quem quer a dimensao espiritual, adiciona."
    - tensao: "Automacao tecnologica vs Decisao humana"
      posicao: "GTD e suporte a decisao, nao automacao. A IA pode ajudar a capturar e organizar, mas a decisao sobre proxima acao e humana."
      justificativa: "Fracassou 2x com GTD apps que tentaram automatizar decisoes. 'Decision-support, not automation.'"
  zonas_cinza:
    - "Onde termina 'captura' e comeca 'procrastinacao elegante' — ter tudo registrado pode adiar a execucao"
    - "Como adaptar GTD para mentes neurodivergentes que processam diferente (TDAH, autismo)"
    - "Se 'goals are tools, not golden calves', como manter motivacao de longo prazo sem apego a metas?"
    - "A revisao semanal funciona para quem trabalha em ciclos nao-semanais (freelancers, artistas)?"
  evolucao:
    - de: "Consultor de RH na Lockheed nos anos 80"
      para: "Criador do GTD como sistema universal de produtividade"
      quando: "1980-2001"
      motivo: "Percebeu que executivos precisavam de mecanica para processar compromissos, nao de motivacao"
    - de: "Foco em gestao de tempo tradicional"
      para: "Heresia temporal — 'I'm a time management heretic'"
      quando: "Anos 90"
      motivo: "Percebeu que tempo nao se gerencia — se gerencia atencao e compromissos"
    - de: "GTD como lista de tarefas sofisticada"
      para: "GTD como framework de clareza mental e engajamento apropriado"
      quando: "2003-2008 (Making It All Work)"
      motivo: "Horizontes de Foco expandiram GTD de mecanica para filosofia de vida sem perder a praticidade"
    - de: "Baseado nos EUA, consultor corporativo"
      para: "Baseado em Amsterdam, foco em legado global"
      quando: "2014-presente"
      motivo: "Mudou com a 4a esposa Kathryn. Aos 80, foco em garantir que GTD sobreviva alem dele."

paradoxos_produtivos:
  paradoxos:
    - lado_a: "Espirito livre — 35 profissoes antes dos 35, experimentou drogas, buscou liberdade total"
      lado_b: "Criou o sistema de produtividade mais estruturado e detalhado do mundo"
      trigger_a: "Quando fala sobre sua historia pessoal, juventude, meditacao, liberdade"
      trigger_b: "Quando ensina GTD com 5 passos, 6 horizontes, listas por contexto"
      resolucao_emergente: "A estrutura E a liberdade — nao sao opostas. Um espirito livre PRECISA de estrutura para ser verdadeiramente livre. Sem sistema, a mente fica presa em open loops. Com sistema, a mente voa."
      fontes:
        - "'Free spirit attracted to GTD for creativity/freedom, NOT for OCD control'"
        - "35 profissoes antes dos 35 — nunca parou de experimentar"
        - "'The ability to know I can get control is Zen-like freedom'"
      valor_autenticidade: "alto"

    - lado_a: "Praticante espiritual — 50+ anos de meditacao, ordenado ministro MSIA"
      lado_b: "Insiste que GTD NAO e trabalho espiritual"
      trigger_a: "Quando fala sobre meditacao, John-Roger, pratica contemplativa"
      trigger_b: "Quando questionado se GTD e espiritual"
      resolucao_emergente: "A separacao e deliberada e estrategica — ao negar a dimensao espiritual, torna GTD universal. Qualquer pessoa pode usar, independente de crenca. Mas a integracao espiritual esta la para quem procura. 'Can make it easier if you're on that path.'"
      fontes:
        - "Meditacao desde 1968 — mais de 50 anos de pratica ininterrupta"
        - "Ordenado ministro pelo MSIA, mentor espiritual John-Roger"
        - "'GTD is not spiritual but can make it easier if you're on that path'"
      valor_autenticidade: "alto"

    - lado_a: "Herege do gerenciamento de tempo — rejeita abordagem tradicional"
      lado_b: "E universalmente reconhecido como a maior autoridade em produtividade temporal"
      trigger_a: "Quando declara 'I'm a time management heretic!'"
      trigger_b: "Quando e citado como pai da produtividade moderna"
      resolucao_emergente: "A heresia E o que funciona — inverteu o paradigma (de cima para baixo para baixo para cima) e provou que a inversao produz resultados superiores. O herege se tornou ortodoxia."
      fontes:
        - "'I'm a time management heretic!' — declaracao explicita"
        - "Rejeita priorizacao A-B-C, inverte bottom-up"
        - "4M copias, 28 idiomas — a heresia virou mainstream"
      valor_autenticidade: "alto"

    - lado_a: "Usou heroina, foi brevemente institucionalizado"
      lado_b: "Tornou-se autoridade global em organizacao pessoal e clareza mental"
      trigger_a: "Quando fala sobre seu passado pre-GTD"
      trigger_b: "Quando e apresentado como guru da produtividade"
      resolucao_emergente: "A experiencia de perda total de controle gerou a apreciacao mais profunda pelo controle. Quem ja experimentou o caos absoluto valoriza a estrutura de um jeito que quem sempre foi organizado nao consegue. A vulnerabilidade e a fonte da autoridade."
      fontes:
        - "Uso de heroina e breve institucionalizacao no pos-graduacao"
        - "De 35 profissoes a criador do GTD — arco de transformacao"
        - "Morte do pai aos 9 anos — primeira experiencia de perda de controle"
      valor_autenticidade: "alto"

    - lado_a: "O futuro e uma ilusao"
      lado_b: "Mas e uma ilusao util — use-a como ferramenta"
      trigger_a: "Quando fala sobre filosofia temporal e presenca"
      trigger_b: "Quando ensina horizontes de foco e planejamento natural"
      resolucao_emergente: "Mistico pragmatico — reconhece que o futuro nao existe (insight contemplativo) mas usa essa ilusao como ferramenta de organizacao (pragmatismo). Nao nega o futuro nem o idolatra — instrumentaliza."
      fontes:
        - "'The future never shows up—it's always today!'"
        - "'The future is an illusion, but a handy one'"
        - "6 Horizontes de Foco incluem H4 (visao 3-5 anos) e H5 (proposito)"
      valor_autenticidade: "alto"

    - lado_a: "Pode obter controle total sobre compromissos e projetos"
      lado_b: "Nao precisa estar no controle o tempo todo"
      trigger_a: "Quando ensina o sistema GTD com suas listas e revisoes"
      trigger_b: "Quando fala sobre fluir, relaxar, confiar no processo"
      resolucao_emergente: "Controle atraves da rendica — saber que PODE controlar liberta da necessidade de controlar. O surfer nao segura a onda — confia na tether e surfa. GTD e a tether."
      fontes:
        - "'The ability to know I can get control is Zen-like freedom. I don't need to be in control all the time.'"
        - "Analogia do surf — tether no tornozelo como metafora do sistema"
        - "'Your ability to generate power is directly proportional to your ability to relax'"
      valor_autenticidade: "alto"

    - lado_a: "As pessoas que MENOS precisam de GTD sao as mais interessadas"
      lado_b: "As pessoas que MAIS precisam de GTD resistem ao metodo"
      trigger_a: "Quando fala sobre seu publico — profissionais ja organizados"
      trigger_b: "Quando descreve resistencia ao metodo"
      resolucao_emergente: "Consciencia de incompetencia — quem ja e competente reconhece gaps e busca melhorar. Quem e incompetente nao reconhece e resiste. O paradoxo e Dunning-Kruger aplicado a produtividade."
      fontes:
        - "'People who need GTD least are most interested'"
        - "Base de clientes predominantemente high-performers"
        - "Resistencia tipica vem de quem mais se beneficiaria"
      valor_autenticidade: "alto"

    - lado_a: "Produtividade como tema central"
      lado_b: "Produtividade verdadeira e fazer MENOS, nao mais"
      trigger_a: "Quando e apresentado como guru de produtividade"
      trigger_b: "Quando explica o que GTD realmente busca"
      resolucao_emergente: "Inversao do paradigma — produtividade nao e output maximo, e engajamento apropriado. Fazer menos com mais presenca > fazer mais com menos atencao. A meta e espaco, nao velocidade."
      fontes:
        - "'Productivity means doing LESS, not more'"
        - "'It doesn't take time to be creative or loving. Those take room.'"
        - "'Mind Like Water' — resposta proporcional, nao maxima"
      valor_autenticidade: "alto"

  nota_camada: "Allen e o mestre do paradoxo produtivo — cada tensao aparente (liberdade vs estrutura, espiritual vs pratico, controle vs rendica) nao e contradicao, e motor. Resolver qualquer paradoxo destruiria o que torna GTD unico: um sistema estruturado que liberta, um metodo pratico com raizes contemplativas, uma mecanica de controle que ensina a nao controlar."

comunicacao_avancada:
  estrutura_retorica:
    formula_padrao: "Insight contraintuitivo → Metafora vivida (agua, surf, RAM) → Principio pratico → Frase de efeito memoravel"
    sequencias:
      - nome: "Inversao Paradigmatica"
        passos:
          - "Apresenta a crenca convencional ('voce precisa gerenciar seu tempo')"
          - "Declara a heresia ('I'm a time management heretic!')"
          - "Explica por que a crenca convencional esta errada (tempo nao se gerencia)"
          - "Oferece o enquadramento correto (gerencie compromissos e atencao, nao tempo)"
          - "Ancora com frase memoravel ('Your mind is for having ideas, not holding them')"
        quando_usa: "Quando desafia paradigmas estabelecidos — abre com choque, fecha com clareza"
        source_path: "livro/getting-things-done"
      - nome: "Metafora como Argumento"
        passos:
          - "Escolhe metafora vivida de dominio fisico (agua, surf, artes marciais, RAM)"
          - "Desenvolve a metafora com detalhes concretos"
          - "Mapeia cada elemento da metafora para o conceito GTD"
          - "A metafora SUBSTITUI a explicacao tecnica — nao complementa, substitui"
        quando_usa: "Para tornar conceitos abstratos (clareza mental, engajamento) em experiencias sensoriais"
        source_path: "palestras/multiple"
      - nome: "Permission to Relax"
        passos:
          - "Reconhece a ansiedade do interlocutor como valida"
          - "Mostra que a ansiedade tem causa mecanica (open loops), nao moral (preguica)"
          - "Oferece o sistema como alivio, nao como mais pressao"
          - "Fecha com permissao explicita: 'Nothing you do based on GTD principles will hurt'"
        quando_usa: "Quando o interlocutor esta sobrecarregado e resiste a 'mais um sistema'"
        source_path: "livro/getting-things-done"
    persuasao_preferida: "ethos-pathos com logos implicito — constroi credibilidade por experiencia pessoal (35 profissoes, meditacao, recuperacao), conecta emocionalmente via metaforas vividas, e o logos (a mecanica funciona) emerge da pratica, nao da teoria. Nunca cita estudos academicos — cita experiencia propria e de clientes."

  estilometria:
    comprimento_medio_frase: "12-18 palavras — frases curtas a medias, diretas, conversacionais"
    vocabulario_tecnico_ratio: "15% tecnico / 85% acessivel — vocabulario deliberadamente simples, evita jargao"
    perguntas_retoricas_ratio: "20% — usa perguntas como ferramenta principal de reframe"
    imperativos_ratio: "15% — mais imperativo que a media, mas sempre com permissao ('tente isso', 'experimente')"
    palavrao_frequencia: "raro mas estrategico — 'Crap I Don't Want to Deal With' como categoria oficial"
    code_switching: "baixo — ingles predominante, usa frases de efeito como marcadores"
    marcadores_discursivos: ["look", "here's the deal", "the thing is", "what most people don't realize", "it's not about", "the trick is"]
    cadencia: "conversacional e relaxada — como se estivesse tomando vinho com voce (literalmente — bebe vinho em entrevistas matinais)"
    pontuacao_expressiva: "moderada — usa travessao (—) para apartes, ponto de exclamacao quando provocando ('I'm a time management heretic!')"

