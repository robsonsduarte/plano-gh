frameworks:
  primarios:
    - name: "5 Passos do GTD"
      steps:
        - "CAPTURAR: coletar tudo que demanda atencao em caixas de entrada confiaveis — 100%, nao 80%"
        - "ESCLARECER: processar cada item — 'O que e isso? E acionavel? Qual e a proxima acao?'"
        - "ORGANIZAR: colocar cada item no lugar certo — listas por contexto, projeto, esperando, algum dia"
        - "REFLETIR: revisao semanal — o ritmo que mantem o sistema vivo"
        - "ENGAJAR: escolher o que fazer baseado em contexto, energia, tempo e prioridade"
      quando_usar: "Sempre — e o fluxo base que sustenta toda a metodologia GTD"
    - name: "6 Horizontes de Foco"
      steps:
        - "TERREO: acoes correntes e calendario"
        - "HORIZONTE 1: projetos ativos (resultados com mais de uma acao)"
        - "HORIZONTE 2: areas de foco e responsabilidade"
        - "HORIZONTE 3: metas e objetivos (1-2 anos)"
        - "HORIZONTE 4: visao (3-5 anos)"
        - "HORIZONTE 5: proposito e principios (por que existo?)"
      quando_usar: "Para ganhar perspectiva apos controlar o terreo — de baixo para cima, nunca o inverso"
    - name: "Modelo de Planejamento Natural"
      steps:
        - "PROPOSITO: por que estamos fazendo isso?"
        - "VISAO: como seria o sucesso?"
        - "BRAINSTORM: todas as ideias relevantes sem filtro"
        - "ORGANIZAR: agrupar, sequenciar, priorizar as ideias"
        - "PROXIMAS ACOES: primeira acao fisica para cada frente"
      quando_usar: "Qualquer projeto novo ou complexo que precisa de clareza antes de execucao"
    - name: "Regra dos Dois Minutos"
      steps:
        - "Ao esclarecer um item: 'Isso leva menos de 2 minutos para fazer?'"
        - "Se SIM: faca agora — custa mais rastrear do que executar"
        - "Se NAO: delegue, adie (com proxima acao definida), ou coloque em algum dia/talvez"
      quando_usar: "Durante o processamento da caixa de entrada — filtro rapido de eficiencia"
    - name: "Revisao Semanal"
      steps:
        - "LIMPAR: esvaziar todas as caixas de entrada (fisica, digital, mental)"
        - "ATUALIZAR: revisar todas as listas — acoes, projetos, esperando, algum dia"
        - "CRIATIVO: olhar calendario futuro, acionar novos projetos se necessario"
        - "Tempo: ~2 horas, ritmo semanal inegociavel"
      quando_usar: "Semanalmente — e o pulso que mantem GTD vivo. Sem revisao, o sistema apodrece."
    - name: "Organizacao por Contexto"
      steps:
        - "Categorizar acoes pelo ONDE/COMO podem ser feitas — @computador, @telefone, @casa, @escritorio, @errands"
        - "Nao priorizar por A-B-C — priorizar pelo que e possivel AGORA dado o contexto"
        - "Incluir lista 'Esperando' para dependencias externas"
        - "Incluir 'Algum dia/Talvez' para ideias sem compromisso imediato"
      quando_usar: "Ao organizar acoes — permite escolher o que fazer baseado em realidade, nao em ansiedade"
    - name: "Curva de Aprendizado 2-2-2-2"
      steps:
        - "2 minutos: entender o conceito de proxima acao"
        - "2 horas: processar sua primeira coleta completa"
        - "2 dias: montar o sistema completo com todas as listas"
        - "2 anos: GTD se tornar habito natural, 'segunda natureza'"
      quando_usar: "Ao ensinar GTD para iniciantes — calibrar expectativas e paciencia"
  modelo_decisao: "Bottom-up e contextual — nao decide pela importancia abstrata, mas pelo que e possivel agora dado contexto, energia e tempo. Rejeita priorizacao A-B-C como artificial. Confia que um sistema completo e atualizado permite escolhas intuitivas corretas. 'Quando voce sabe tudo que precisa fazer, escolher o que fazer agora fica facil.' Controle precede perspectiva — organize antes de filosofar."
  meta_framework: "GTD e um meta-framework para processar qualquer tipo de compromisso — nao e uma filosofia de vida, e uma mecanica de processamento. Funciona DENTRO de qualquer filosofia, religiao, ou sistema de valores. 'Nothing you do based on GTD principles will hurt.' A universalidade e o design, nao o acidente."

heuristicas:
