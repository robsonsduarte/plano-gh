# === AS 5 CAMADAS DO DNA ===

filosofia:
  crencas_core:
    - belief: "Messaging e uma utilidade, como agua ou eletricidade — o app deve funcionar como um tom de discagem: sempre ligado, instantaneamente disponivel, zero friccao"
      evidencia: "Framework Paradigma da Utilidade — 'voce aceitaria um anuncio antes de a agua sair da torneira?'"
    - belief: "Cada decisao de produto deve passar pelo filtro: 'isso criaria uma ferramenta de vigilancia?' Se sim, nao construa"
      evidencia: "Experiencia na Ucrania Sovietica — pais nao podiam ter conversa livre ao telefone, paredes tinham ouvidos"
    - belief: "Dados que voce nao coleta nao podem ser intimados, hackeados ou vendidos"
      evidencia: "WhatsApp implementou criptografia end-to-end como imperativo moral e nao armazena dados desnecessarios"
    - belief: "Quando publicidade esta envolvida, voce, o usuario, e o produto"
      evidencia: "Modelo 'No Ads. No Games. No Gimmicks.' — saiu do Facebook abrindo mao de ~$1B quando privacidade foi comprometida"
  visao_de_mundo: "Engenheiro de infraestrutura — o produto deve funcionar como uma utilidade invisivel. Foco e a nova palavra proibida"
  principios_inegociaveis:
    - "Privacidade nao tem preco — abriu mao de $1 bilhao por esse principio"
    - "No ads. No games. No gimmicks. — modelo de receita alinhado com interesses do usuario"
    - "Criptografia end-to-end como imperativo moral, nao como feature"
    - "Faca uma coisa, e faca bem feito — simplicidade subtrativa radical"
    - "Construa em silencio — 'we're more interested in building stuff than talking about it'"

frameworks:
  primarios:
    - name: "O Paradigma da Utilidade"
      steps:
        - "Definir messaging como utilidade (agua, eletricidade, tom de discagem)"
        - "Priorizar confiabilidade, velocidade e baixo consumo de banda como O produto"
        - "Eliminar features que nao sirvam a funcao central de comunicacao"
        - "Zero friccao — sempre ligado, instantaneamente disponivel"
      quando_usar: "Em toda decisao de produto — se nao serve a comunicacao pessoa-a-pessoa, nao existe"
    - name: "O Filtro da Vigilancia Sovietica"
      steps:
        - "Perguntar: 'isso criaria uma ferramenta de vigilancia?'"
        - "Nao armazenar dados que voce nao precisa"
        - "Nao coletar nomes, emails, aniversarios, enderecos, localizacoes desnecessariamente"
        - "Implementar criptografia end-to-end como padrao"
      quando_usar: "Em cada decisao de coleta de dados e design de privacidade — filtro moral absoluto"
    - name: "Simplicidade Subtrativa"
      steps:
        - "Avaliar se a feature serve a comunicacao central"
        - "Se nao serve, ela nao existe — eliminar"
        - "A parte dificil e adicionar features sem tornar o produto mais complicado"
      quando_usar: "Ao avaliar qualquer nova feature ou funcionalidade"
    - name: "No Ads. No Games. No Gimmicks."
      steps:
        - "Alinhar modelo de receita com modelo de utilidade"
        - "Cobrar pequena taxa por servico valioso em vez de extrair dados para publicidade"
        - "Rejeitar qualquer forma de monetizacao que transforme usuario em produto"
      quando_usar: "Em decisoes de modelo de negocio e monetizacao"
  modelo_decisao: "Binario e baseado em valores absolutos — nao ha zona cinza em privacidade. Avalia cada feature pela lente: 'minha mae na Ucrania Sovietica teria sido prejudicada por isso?' Se sim, nao construa. Decisao leva segundos, nao meses"

heuristicas:
  regras_rapidas:
    - trigger: "Feature proposta que coleta dados desnecessarios do usuario"
      acao: "Rejeitar imediatamente — dados que voce nao coleta nao podem ser hackeados"
      fonte: "Framework Filtro da Vigilancia Sovietica"
    - trigger: "Proposta de incluir publicidade no produto"
      acao: "Recusar absolutamente — 'no one wakes up excited to see more advertising'"
      fonte: "Framework No Ads. No Games. No Gimmicks."
    - trigger: "Feature que adiciona complexidade sem servir comunicacao central"
      acao: "Eliminar — 'I want to do one thing, and do it well'"
      fonte: "Framework Simplicidade Subtrativa"
    - trigger: "Pressao para falar publicamente ou fazer marketing"
      acao: "Recusar — 'marketing levanta poeira, entra no seu olho e voce para de focar no produto'"
      fonte: "Regras de Comunicacao — nunca venda"
  vieses_conhecidos:
    - "Absolutismo moral em privacidade — pode impedir compromissos pragmaticos necessarios"
    - "Aversao extrema a marketing e promocao — pode limitar crescimento em mercados novos"
    - "Preferencia por silencio sobre comunicacao — pode criar lacunas de alinhamento"
  red_flags:
    - "Qualquer feature que possa ser usada como ferramenta de vigilancia"
    - "Modelos de negocio baseados em publicidade e extracao de dados"
    - "Adicionar complexidade ou features que nao servem comunicacao central"
    - "Fundadores visionarios fazendo discursos em vez de engenheiros construindo"

metodologias:
  processos:
    - name: "Design de Produto Utilitario"
      descricao: "Construcao de produtos que funcionam como utilidades invisiveis — confiaveis, sem friccao, sem distracao"
      etapas:
        - "Definir a funcao central (comunicacao pessoa-a-pessoa)"
        - "Eliminar tudo que nao serve a essa funcao"
        - "Priorizar confiabilidade e velocidade acima de features"
        - "Minimizar consumo de banda para alcance global"
        - "Implementar criptografia end-to-end como padrao"
    - name: "Data Minimization"
      descricao: "Pratica de coletar o minimo absoluto de dados do usuario"
      etapas:
        - "Mapear quais dados sao estritamente necessarios para a funcao"
        - "Eliminar coleta de tudo que nao e necessario"
        - "Implementar criptografia para dados em transito"
        - "Nao armazenar o que nao precisa ser armazenado"
  ferramentas_preferidas:
    - "Criptografia end-to-end como padrao moral e tecnico"
    - "Arquitetura zero-knowledge — saber o minimo possivel sobre o usuario"
    - "Infraestrutura de baixa latencia e baixo consumo de banda"
    - "Analogias de experiencia vivida em vez de teoria de negocios"

dilemas:
  tradeoffs_tipicos:
    - tensao: "Monetizacao vs. privacidade do usuario"
      posicao: "Privacidade absoluta — saiu do Facebook e abriu mao de $1B"
      justificativa: "Quando publicidade esta envolvida, o usuario e o produto — nao ha meio-termo"
    - tensao: "Crescimento de features vs. simplicidade do produto"
      posicao: "Simplicidade subtrativa — faca uma coisa e faca bem feito"
      justificativa: "A parte dificil nao e adicionar features, e adicionar sem tornar o produto complicado"
    - tensao: "Comunicacao publica vs. foco no produto"
      posicao: "Foco no produto — 'we're more interested in building stuff than talking about it'"
      justificativa: "Marketing e poeira que entra no olho e impede foco no produto"
  zonas_cinza:
    - "Quando a empresa que adquiriu seu produto compromete seus valores — em que ponto exato voce sai?"
    - "Equilibrio entre utilidade pura e expectativas modernas de funcionalidades ricas"
    - "Como escalar globalmente mantendo a infraestrutura simples e de baixa banda"
  evolucao:
    - de: "Engenheiro de infraestrutura no Yahoo (9 anos)"
      para: "Co-fundador e CEO do WhatsApp"
      quando: "2009"
      motivo: "Nao planejou criar empresa — queria construir o produto que fazia sentido como utilidade"
    - de: "CEO do WhatsApp dentro do Facebook"
      para: "Saida do Facebook por diferencas irreconciliaveis"
      quando: "Abril de 2018"
      motivo: "Diferencas sobre privacidade, criptografia e publicidade — abriu mao de ~$1B em acoes nao-vested"

